<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albano Insurance Solutions | Insurance Risk Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{margin:0;font-family:'Inter',sans-serif;background:#ffffff;color:#0a0a0a;}

.header{
  background:linear-gradient(90deg,#0b2a45,#1f6fb2);
  color:#fff;
  padding:22px;
  font-size:22px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:15px;
}

.logo{height:45px;}

.container{max-width:1100px;margin:auto;padding:30px 20px;}

.card{
  background:#ffffff;
  padding:24px;
  border-radius:14px;
  border:1px solid #e6edf5;
  box-shadow:0 10px 25px rgba(0,0,0,.05);
  margin-bottom:20px;
}

input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #d6e0ea;
  font-size:14px;
  transition:.2s;
}

input:focus,select:focus{
  border-color:#1f6fb2;
  outline:none;
  box-shadow:0 0 0 2px rgba(31,111,178,.15);
}

button{
  background:linear-gradient(90deg,#0b2a45,#1f6fb2);
  color:#fff;
  padding:14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  width:100%;
  font-weight:700;
  font-size:15px;
  transition:.2s;
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 14px rgba(0,0,0,.15);
}

.table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

.table td,.table th{
  border:1px solid #e6edf5;
  padding:10px;
  font-size:13px;
}

.table th{
  background:#0b2a45;
  color:#fff;
}

.high{background:#fdeaea;}
.mid{background:#fff5e6;}
.low{background:#e6f6ec;}

.exec{
  background:#f3f7fc;
  padding:18px;
  border-radius:10px;
  margin-top:15px;
  font-size:15px;
  border-left:4px solid #1f6fb2;
  white-space:pre-line;
}
</style>
</head>
<body>

<div class="header">
<img src="AlbanoInsurance_logo-fullcolor.png" class="logo" onerror="this.style.display='none'">
Albano Insurance Solutions | Insurance Risk Analysis Report
</div>

<div class="container">

<div class="card" id="leadCard">
<input id="business" placeholder="Business Name">
<input id="email" placeholder="Email">
<select id="trade">
<option>Electrician</option>
<option>Plumber</option>
<option>Painter</option>
<option>HVAC</option>
<option>General Contractor</option>
</select>
<input id="revenue" placeholder="Annual Revenue ($)" oninput="formatCurrencyInput(this)">

<h4>Current Insurance Premium Input</h4>
<input id="gl" placeholder="General Liability ($)" oninput="formatCurrencyInput(this)">
<input id="wc" placeholder="Workers Comp ($)" oninput="formatCurrencyInput(this)">
<input id="auto" placeholder="Commercial Auto ($)" oninput="formatCurrencyInput(this)">
<input id="equip" placeholder="Equipment ($)" oninput="formatCurrencyInput(this)">
<input id="umbrella" placeholder="Umbrella ($)" oninput="formatCurrencyInput(this)">

<button onclick="submitLead()">Generate My Report</button>
</div>

<div class="card" id="report" style="display:none">
<div id="execSummary" class="exec"></div>
<table class="table" id="comparisonTable"></table>
<button onclick="downloadPDF()">Download Full Executive Report</button>
</div>

</div>

<script>
function parseNumber(v){return parseFloat((v||'').replace(/,/g,''))||0}
function fmt(n){return "$"+Math.round(n).toLocaleString('en-US')}

function formatCurrencyInput(el){
  let raw = (el.value||'').replace(/[^0-9.]/g,'');
  if(raw===''){el.value='';return;}
  let num=parseFloat(raw);
  if(isNaN(num)){el.value='';return;}
  el.value=Math.floor(num).toLocaleString('en-US');
}

const TRADE={
 Electrician:{gl:.005,auto:.018,inland:.008,umb:.002,payroll:.32,wc:4.5},
 Plumber:{gl:.006,auto:.02,inland:.01,umb:.0025,payroll:.35,wc:5.5},
 Painter:{gl:.0045,auto:.015,inland:.007,umb:.002,payroll:.30,wc:6},
 HVAC:{gl:.0055,auto:.02,inland:.009,umb:.0025,payroll:.34,wc:5},
 "General Contractor":{gl:.007,auto:.022,inland:.012,umb:.003,payroll:.38,wc:6.5}
};

function benchmark(trade,rev){
let t=TRADE[trade];
if(!t)return {gl:0,wc:0,auto:0,equip:0,umbrella:0};
let payroll=rev*t.payroll;
return{
 gl:rev*t.gl,
 wc:(payroll/100)*t.wc,
 auto:rev*t.auto,
 equip:rev*t.inland,
 umbrella:rev*t.umb
};
}

function getHeat(pct){
 if(pct>25)return 'high';
 if(pct>10)return 'mid';
 return 'low';
}

let lastAnalysis=null;

function submitLead(){
let revenue=parseNumber(document.getElementById('revenue').value);
if(!revenue){alert('Enter revenue');return;}

let trade=document.getElementById('trade').value;
let bench=benchmark(trade,revenue);

let lead={
 gl:parseNumber(document.getElementById('gl').value),
 wc:parseNumber(document.getElementById('wc').value),
 auto:parseNumber(document.getElementById('auto').value),
 equip:parseNumber(document.getElementById('equip').value),
 umbrella:parseNumber(document.getElementById('umbrella').value)
};

let rows=[
 {name:'General Liability',key:'gl'},
 {name:'Workers Comp',key:'wc'},
 {name:'Commercial Auto',key:'auto'},
 {name:'Equipment',key:'equip'},
 {name:'Umbrella',key:'umbrella'}
];

let totalDiff=0, insights=[];
let html=`<tr><th>Coverage</th><th>Current</th><th>Expected</th><th>Variance</th><th>%</th></tr>`;

rows.forEach(r=>{
 let c=lead[r.key]||0;
 let e=bench[r.key]||0;
 let diff=c-e;
 let pct=e?((diff/e)*100):0;

 if(diff>0){totalDiff+=diff;insights.push({name:r.name,impact:diff});}

 html+=`<tr class="${getHeat(pct)}">
 <td>${r.name}</td>
 <td>${fmt(c)}</td>
 <td>${fmt(e)}</td>
 <td>${fmt(diff)}</td>
 <td>${Math.round(pct)}%</td>
 </tr>`;
});

document.getElementById('comparisonTable').innerHTML=html;
insights.sort((a,b)=>b.impact-a.impact);
lastAnalysis={totalDiff,insights};

document.getElementById('execSummary').innerText=`You may be overpaying approximately ${fmt(totalDiff)} annually.`;
document.getElementById('report').style.display='block';
}
</script>

</body>
</html>
