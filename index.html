<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albano Insurance | Insurance Risk Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{margin:0;font-family:'Inter',sans-serif;background:#fff;color:#0a0a0a}
.header{background:linear-gradient(90deg,#0b2a45,#1f6fb2);color:#fff;padding:22px;font-size:22px;font-weight:700;text-align:center}
.container{max-width:1100px;margin:auto;padding:30px}
.card{background:#fff;padding:24px;border-radius:14px;border:1px solid #e6edf5;box-shadow:0 10px 25px rgba(0,0,0,.05);margin-bottom:20px}
input,select{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:1px solid #d6e0ea}
button{background:linear-gradient(90deg,#0b2a45,#1f6fb2);color:#fff;padding:14px;border:none;border-radius:8px;width:100%;font-weight:700}
.table{width:100%;border-collapse:collapse;margin-top:15px}
.table td,.table th{border:1px solid #e6edf5;padding:10px}
.table th{background:#0b2a45;color:#fff}
.high{background:#fdeaea}.mid{background:#fff5e6}.low{background:#e6f6ec}
.exec{background:#f3f7fc;padding:18px;border-left:4px solid #1f6fb2;white-space:pre-line}
.footer{text-align:center;margin-top:20px;font-size:12px;color:#666}
.score{font-size:24px;font-weight:700;margin-bottom:10px}
.impact{font-size:16px;font-weight:600;color:#b22222;margin-bottom:10px}
.error{color:#b22222;font-size:13px;display:none}
.gauge-wrap{display:flex;align-items:center;gap:20px;margin-bottom:10px}
</style>
</head>
<body>
<div class="header">Insurance Risk Analysis Report</div>
<div class="container">

<div class="card">
<input id="business" placeholder="Business Name">
<input id="email" type="email" placeholder="Email (required)">
<div id="emailError" class="error">Please enter a valid email.</div>
<select id="trade">
<option>Electrician</option>
<option>Plumber</option>
<option>Painter</option>
<option>HVAC</option>
<option>General Contractor</option>
</select>
<input id="revenue" placeholder="Annual Revenue" oninput="fmtInput(this)">
<input id="payroll" placeholder="Payroll (optional)" oninput="fmtInput(this)">
<input id="autos" placeholder="# Vehicles">

<h4>Current Premiums</h4>
<input id="gl" placeholder="General Liability" oninput="fmtInput(this)">
<input id="wc" placeholder="Workers Comp" oninput="fmtInput(this)">
<input id="auto" placeholder="Auto" oninput="fmtInput(this)">
<input id="umbrella" placeholder="Umbrella" oninput="fmtInput(this)">

<button onclick="runAnalysis()">Generate Report</button>
</div>

<div class="card" id="report" style="display:none">
<div class="gauge-wrap">
<canvas id="gauge" width="120" height="120"></canvas>
<div>
<div id="riskScore" class="score"></div>
<div id="jobImpact" class="impact"></div>
</div>
</div>
<div id="summary" class="exec"></div>
<table id="table" class="table"></table>
<button onclick="downloadPDF()">Download PDF</button>
</div>

<div class="footer">
<img src="AlbanoInsurance_logo-fullcolor.png" style="height:50px" onerror="this.style.display='none'"><br>
CA License #0442296
</div>

</div>

<script>
function num(v){return parseFloat((v||'').replace(/,/g,''))||0}
function money(n){return "$"+n.toLocaleString('en-US',{minimumFractionDigits:2})}
function fmtInput(el){let n=num(el.value);el.value=n? n.toLocaleString():''}
function validEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)}

function drawGauge(score){
 const c=document.getElementById('gauge')
 const ctx=c.getContext('2d')
 ctx.clearRect(0,0,120,120)

 let color = score>75 ? '#2ecc71' : score>55 ? '#f1c40f' : '#e74c3c'

 ctx.beginPath()
 ctx.arc(60,60,50,0,Math.PI*2)
 ctx.strokeStyle='#eee'
 ctx.lineWidth=10
 ctx.stroke()

 ctx.beginPath()
 ctx.arc(60,60,50,-Math.PI/2,(score/100)*Math.PI*2-Math.PI/2)
 ctx.strokeStyle=color
 ctx.lineWidth=10
 ctx.stroke()

 ctx.font='20px Inter'
 ctx.fillStyle='#000'
 ctx.textAlign='center'
 ctx.fillText(score,60,68)
}

const DATA={base:{gl:.005,autoPerUnit:1800,umb:.002},wcRates:{Electrician:4.5,Plumber:5.5,Painter:6,HVAC:5,"General Contractor":6.5},payrollPct:{Electrician:.32,Plumber:.35,Painter:.30,HVAC:.34,"General Contractor":.38}}

function benchmark(trade,rev,payroll,autos){
let p=payroll||rev*DATA.payrollPct[trade]
return{gl:rev*DATA.base.gl,wc:(p/100)*DATA.wcRates[trade],auto:(autos||0)*DATA.base.autoPerUnit,umbrella:rev*DATA.base.umb}
}

function heat(p){return p>25?'high':p>10?'mid':'low'}

let state=null;

function runAnalysis(){
 const emailVal=document.getElementById('email').value.trim();
 if(!validEmail(emailVal)){document.getElementById('emailError').style.display='block';return;}else{document.getElementById('emailError').style.display='none';}

 let rev=num(revenue.value); if(!rev) return alert('Enter revenue');
 let tradeSel=trade.value;
 let bench=benchmark(tradeSel,rev,num(payroll.value),num(autos.value));

 let cur={gl:num(gl.value),wc:num(wc.value),auto:num(auto.value),umbrella:num(umbrella.value)}

 let rows=['gl','wc','auto','umbrella']
 let names={gl:'General Liability',wc:'Workers Comp',auto:'Commercial Auto',umbrella:'Umbrella'}

 let html='<tr><th>Coverage</th><th>Current</th><th>Benchmark</th><th>Diff</th><th>%</th></tr>'
 let insights=[]; let total=0; let score=100;

 rows.forEach(k=>{
  let c=cur[k],e=bench[k],d=c-e,p=e?d/e*100:0
  if(d>0){total+=d;insights.push({k,impact:d}); score-=Math.min(25,Math.abs(p))}
  html+=`<tr class="${heat(p)}"><td>${names[k]}</td><td>${money(c)}</td><td>${money(e)}</td><td>${money(d)}</td><td>${p.toFixed(1)}%</td></tr>`
 })

 score=Math.max(40,Math.round(score))
 drawGauge(score)

 let jobs=Math.max(1,Math.round(rev/50000))
 let costPerJob=total/jobs

 insights.sort((a,b)=>b.impact-a.impact)
 state={total,insights,tableHTML:html,score,costPerJob,names}

 riskScore.innerText=`Risk Score vs Peers: ${score}/100`
 jobImpact.innerText=`Estimated Overbidding Impact: ${money(costPerJob)} per job`

 summary.innerText=`Estimated Overpayment: ${money(total)}\n\nTop Cost Drivers:\n${insights.slice(0,3).map(i=>`• ${names[i.k]}: ${money(i.impact)}`).join('\n')}`

 table.innerHTML=html
 report.style.display='block'
}

function downloadPDF(){
 const { jsPDF } = window.jspdf
 if(!state) return alert('Run report first')

 const doc = new jsPDF('landscape','mm','a4')
 const pageWidth = 297
 const pageHeight = 210

 // ===== HEADER =====
 doc.setFillColor(11,42,69)
 doc.rect(0,0,pageWidth,24,'F')

 doc.setTextColor(255)
 doc.setFontSize(20)
 doc.text('Insurance Risk Analysis Executive Summary',12,15)

 // ===== LOGO =====
 const logo = document.querySelector('.footer img')
 if(logo && logo.complete){
   try{
     const canvas = document.createElement('canvas')
     canvas.width = logo.naturalWidth
     canvas.height = logo.naturalHeight
     const ctx = canvas.getContext('2d')
     ctx.drawImage(logo,0,0)
     const logoData = canvas.toDataURL('image/png')
     doc.addImage(logoData,'PNG',235,4,50,16)
   }catch(e){console.log(e)}
 }

 doc.setTextColor(0)

 // ===== CLIENT INFO =====
 const biz = document.getElementById('business').value || 'Client'
 const tradeVal = document.getElementById('trade').value

 doc.setFontSize(11)
 doc.text(`Prepared For: ${biz}`,12,35)
 doc.text(`Trade: ${tradeVal}`,12,42)
 doc.text(`Risk Score: ${state.score}/100`,12,49)
 doc.text(`Estimated Overpayment: ${money(state.total)}`,12,56)
 doc.text(`Overbid Impact: ${money(state.costPerJob)} per job`,12,63)

 // ===== EXECUTIVE SUMMARY =====
 doc.setFontSize(13)
 doc.text('Executive Summary',12,78)
 doc.setDrawColor(180)
 doc.line(12,81,140,81)

 doc.setFontSize(10)
 const narrative = [
  'This analysis benchmarks your insurance program against California contractor peer data using WCIRB payroll modeling, commercial auto fleet benchmarks, and trade-specific liability trends.',
  `Primary pricing concerns were identified in: ${state.insights.slice(0,3).map(i=>state.names[i.k]).join(', ')}.`,
  'Contractors paying materially above benchmark often experience higher bid costs, reduced project competitiveness, and unnecessary premium leakage.',
  'Even when pricing appears competitive, policies should still be reviewed for exclusions, subcontractor limitations, endorsements, and carrier appetite alignment.'
 ]

 let y = 88
 narrative.forEach(n=>{
   const lines = doc.splitTextToSize(n,125)
   doc.text(lines,12,y)
   y += lines.length * 5 + 4
 })

 // ===== RECOMMENDATION BOX =====
 doc.setFillColor(243,247,252)
 doc.roundedRect(12,135,125,45,3,3,'F')

 doc.setFontSize(12)
 doc.text('Recommended Next Steps',18,146)

 doc.setFontSize(10)
 const recs = [
  '• Review Workers Compensation classification + payroll allocation',
  '• Evaluate commercial auto structure and fleet rating factors',
  '• Review GL exclusions, endorsements, and subcontractor limitations',
  '• Re-market coverage with carriers aligned to your trade profile'
 ]

 let ry = 154
 recs.forEach(r=>{
   doc.text(r,18,ry)
   ry += 6
 })

 doc.setFontSize(11)
 doc.text('Schedule a coverage review with Chris Gibson',18,178)
 doc.setFontSize(10)
 doc.text('916-864-4983 | cgibson@addlins.com',18,185)

 // ===== VISUAL REPORT SECTION =====
 html2canvas(document.getElementById('report'),{
   scale:2,
   backgroundColor:'#ffffff'
 }).then(canvas=>{

   const img = canvas.toDataURL('image/png')

   // RIGHT SIDE VISUAL REPORT
   doc.addImage(img,'PNG',150,32,132,160)

   // ===== FOOTER =====
   doc.setFontSize(9)
   doc.setTextColor(120)
   doc.line(12,198,285,198)
   doc.text('Albano Insurance Solutions | CA License #0442296',12,204)
   doc.text('Insurance Risk Analysis Executive Summary',205,204)

   doc.save('Insurance-Risk-Analysis-Executive-Summary.pdf')
 })
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
