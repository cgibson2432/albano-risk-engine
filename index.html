<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albano Insurance Solutions | Insurance Risk Analysis v10</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:'Inter',sans-serif;background:#f7f9fc;color:#0a0a0a;}
.header{background:#0b2a45;color:#fff;padding:20px;font-size:22px;font-weight:700;}
.container{max-width:1100px;margin:auto;padding:20px;}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,.08);margin-bottom:20px;}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc;}
button{background:#0b2a45;color:#fff;padding:14px;border:none;border-radius:8px;cursor:pointer;width:100%;font-weight:700;margin-top:8px;}
.alert{padding:12px;border-radius:8px;margin-top:10px;font-weight:600;}
.red{background:#fdeaea;color:#b30000;}
.orange{background:#fff5e6;color:#b26b00;}
.green{background:#e6f6ec;color:#1f9d55;}
</style>
</head>
<body>

<div class="header">Albano Insurance Solutions | Insurance Risk Analysis Report</div>

<div class="container">

<div class="card" id="leadCard">
<h3>Find hidden cost & renewal risk in your insurance</h3>
<input id="business" placeholder="Business Name">
<input id="email" placeholder="Email">
<input id="cslb" placeholder="CSLB #">

<select id="trade">
<option>Electrician</option>
<option>Plumber</option>
<option>Painter</option>
<option>HVAC</option>
<option>General Contractor</option>
</select>

<input id="revenue" placeholder="Annual Revenue ($)">

<h4>Current Insurance Premium Input</h4>
<input id="wcCarrier" placeholder="Current WC Insurance Company">
<input id="wcRenewal" placeholder="WC Renewal Date (MM/DD/YYYY)">
<input id="wc" placeholder="Workers Comp Premium ($)">

<input id="gl" placeholder="General Liability ($)">
<input id="auto" placeholder="Commercial Auto ($)">
<input id="equip" placeholder="Equipment ($)">
<input id="umbrella" placeholder="Umbrella ($)">

<button onclick="lookupCSLB()">Auto-Fill from CSLB</button>
<button onclick="submitLead()">Generate Report</button>
</div>

<div class="card" id="report" style="display:none">
<div id="renewalAlert"></div>
<p id="summary"></p>
</div>

</div>

<script>
function parseNumber(v){return parseFloat((v||'').replace(/,/g,''))||0}

// CSLB + PREFILL ENGINE
async function lookupCSLB(){
const license=document.getElementById('cslb').value;

try{
const res=await fetch("https://hook.us2.make.com/YOUR_WEBHOOK_URL",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({cslb:license})
});

const data=await res.json();

if(data){
 document.getElementById('wcCarrier').value=data.carrier || '';
 document.getElementById('wcRenewal').value=data.expiration || '';
}

}catch(e){
 alert("CSLB lookup failed. Check webhook.");
}
}

// RENEWAL TRIGGER ENGINE
function checkRenewal(dateStr){
if(!dateStr) return {msg:'No renewal date provided',className:'orange'};

const today=new Date();
const renewal=new Date(dateStr);
const diff=Math.ceil((renewal-today)/(1000*60*60*24));

if(diff<=0) return {msg:'Policy may be expired or renewing now. Immediate action required.',className:'red'};
if(diff<=30) return {msg:'Renewal within 30 days. Highest leverage time to reduce cost.',className:'red'};
if(diff<=60) return {msg:'Renewal within 60 days. Start marketing to carriers now.',className:'orange'};
if(diff<=90) return {msg:'Renewal within 90 days. Optimization window open.',className:'orange'};

return {msg:'Renewal is outside 90 days. Early planning opportunity.',className:'green'};
}

function submitLead(){
let lead={
 business:business.value,
 email:email.value,
 cslb:cslb.value,
 wcCarrier:wcCarrier.value,
 wcRenewal:wcRenewal.value,
 wc:parseNumber(wc.value),
 gl:parseNumber(gl.value),
 auto:parseNumber(auto.value),
 equip:parseNumber(equip.value),
 umbrella:parseNumber(umbrella.value)
};

lead.total=lead.wc+lead.gl+lead.auto+lead.equip+lead.umbrella;

// renewal logic
const renewal=checkRenewal(lead.wcRenewal);
renewalAlert.innerHTML=`<div class="alert ${renewal.className}">${renewal.msg}</div>`;

summary.innerText=`CSLB #: ${lead.cslb}\nWC Carrier: ${lead.wcCarrier}\nRenewal Date: ${lead.wcRenewal}\n\nTotal Insurance Cost: $${lead.total.toLocaleString()}\n\nThis directly impacts your ability to competitively bid jobs.`;

// SEND TO MAKE
fetch("https://hook.us2.make.com/YOUR_WEBHOOK_URL",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify(lead)
}).catch(()=>{});

report.style.display='block';
leadCard.style.display='none';
}
</script>

</body>
</html>
