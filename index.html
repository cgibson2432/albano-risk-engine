<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albano Insurance Solutions | Insurance Risk Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{margin:0;font-family:'Inter',sans-serif;background:#f7f9fc;color:#0a0a0a;}
.header{background:#0b2a45;color:#fff;padding:20px;font-size:22px;font-weight:700;}
.container{max-width:1100px;margin:auto;padding:20px;}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,.08);margin-bottom:20px;}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc;}
button{background:#0b2a45;color:#fff;padding:14px;border:none;border-radius:8px;cursor:pointer;width:100%;font-weight:700;}
.table{width:100%;border-collapse:collapse;margin-top:10px;}
.table td,.table th{border:1px solid #ddd;padding:10px;font-size:13px;text-align:left;}
.high{background:#fdeaea;}
.mid{background:#fff5e6;}
.low{background:#e6f6ec;}
.exec{background:#eef4fb;padding:15px;border-radius:8px;margin-top:15px;line-height:1.5;}
.method{font-size:12px;color:#444;margin-top:10px;}
</style>
</head>
<body>

<div class="header">Albano Insurance Solutions | Insurance Risk Analysis Report</div>

<div class="container">

<div class="card" id="leadCard">
<input id="business" placeholder="Business Name">
<input id="email" placeholder="Email">
<select id="trade">
<option>Electrician</option>
<option>Plumber</option>
<option>Painter</option>
<option>HVAC</option>
<option>General Contractor</option>
</select>
<input id="revenue" placeholder="Annual Revenue ($)">

<h4>Current Insurance Premium Input</h4>
<input id="gl" placeholder="General Liability ($)">
<input id="wc" placeholder="Workers Comp ($)">
<input id="auto" placeholder="Commercial Auto ($)">
<input id="equip" placeholder="Equipment ($)">
<input id="umbrella" placeholder="Umbrella ($)">

<button onclick="submitLead()">Generate My Report</button>
</div>

<div class="card" id="report" style="display:none">
<div id="execSummary" class="exec"></div>
<div id="methodology" class="method"></div>
<table class="table" id="comparisonTable"></table>
<button onclick="downloadPDF()">Download Executive Report</button>
</div>

</div>

<script>
function parseNumber(v){return parseFloat((v||'').replace(/,/g,''))||0}
function fmt(n){return "$"+Math.round(n).toLocaleString()}

const TRADE={
 Electrician:{gl:.005,auto:.018,inland:.008,umb:.002,payroll:.32,wc:4.5},
 Plumber:{gl:.006,auto:.02,inland:.01,umb:.0025,payroll:.35,wc:5.5},
 Painter:{gl:.0045,auto:.015,inland:.007,umb:.002,payroll:.30,wc:6},
 HVAC:{gl:.0055,auto:.02,inland:.009,umb:.0025,payroll:.34,wc:5},
 "General Contractor":{gl:.007,auto:.022,inland:.012,umb:.003,payroll:.38,wc:6.5}
};

function benchmark(trade,rev){
let t=TRADE[trade];
let payroll=rev*t.payroll;
return{
 gl:rev*t.gl,
 wc:(payroll/100)*t.wc,
 auto:rev*t.auto,
 equip:rev*t.inland,
 umbrella:rev*t.umb
};
}

function getHeatClass(pct){
 if(pct > 25) return 'high';
 if(pct > 10) return 'mid';
 return 'low';
}

function submitLead(){
let lead={
 trade:trade.value,
 revenue:parseNumber(revenue.value),
 gl:parseNumber(gl.value),
 wc:parseNumber(wc.value),
 auto:parseNumber(auto.value),
 equip:parseNumber(equip.value),
 umbrella:parseNumber(umbrella.value)
};

let bench=benchmark(lead.trade,lead.revenue);

let rows=[
 {name:'General Liability', key:'gl'},
 {name:'Workers Comp', key:'wc'},
 {name:'Commercial Auto', key:'auto'},
 {name:'Equipment', key:'equip'},
 {name:'Umbrella', key:'umbrella'}
];

let tableHTML=`<tr><th>Coverage</th><th>Current</th><th>Expected</th><th>Variance</th><th>%</th></tr>`;
let issues=[];

rows.forEach(r=>{
 let current=lead[r.key];
 let expected=bench[r.key];
 let diff=current-expected;
 let pct=((diff/expected)*100)||0;
 let cls=getHeatClass(pct);

 if(diff>0) issues.push({name:r.name,impact:diff});

 tableHTML+=`<tr class="${cls}">
 <td>${r.name}</td>
 <td>${fmt(current)}</td>
 <td>${fmt(expected)}</td>
 <td>${fmt(diff)}</td>
 <td>${Math.round(pct)}%</td>
 </tr>`;
});

comparisonTable.innerHTML=tableHTML;
issues.sort((a,b)=>b.impact-a.impact);

let top=issues.slice(0,3).map(i=>`${i.name}: ${fmt(i.impact)}`).join('<br>');

execSummary.innerHTML=`
<b>Executive Summary</b><br><br>
We analyzed your insurance program using California contractor benchmarks based on revenue, payroll ratios, and industry underwriting models.<br><br>
<b>Top Cost Drivers:</b><br>${top}<br><br>
Higher-than-expected premiums increase your cost structure and may force you to overbid jobs.<br><br>
<b>Recommendation:</b> Re-market coverage, review WC classification, and align pricing with market benchmarks.<br><br>
<b>Next Step:</b> Contact Chris Gibson | 916-864-4983 | cgibson@addlins.com
`;

methodology.innerHTML=`
<b>How We Calculated This:</b><br>
Benchmarks are derived from California contractor data including:
<ul>
<li>Revenue-to-premium ratios</li>
<li>Estimated payroll percentages</li>
<li>WCIRB rate assumptions per $100 payroll</li>
<li>Carrier underwriting guidelines</li>
</ul>`;

report.style.display='block';
leadCard.style.display='none';
}

function addHeader(doc,page){
 doc.setFillColor(11,42,69);
 doc.rect(0,0,210,15,'F');
 doc.setTextColor(255,255,255);
 doc.setFontSize(11);
 doc.text('Albano Insurance Solutions',10,10);
}

function addFooter(doc,page){
 doc.setTextColor(0);
 doc.setFontSize(8);
 doc.text('9197 Greenback Lane, Suite E, Orangevale CA 95662 | License #0442296',10,290);
 doc.text('Page '+page,180,290);
}

function downloadPDF(){
const {jsPDF}=window.jspdf;
const doc=new jsPDF();
let y=25;

addHeader(doc,1);

doc.setFontSize(14);
doc.text('Insurance Risk Analysis Report',10,y);
y+=10;

let text=doc.splitTextToSize(execSummary.innerText,180);
doc.setFontSize(10);
doc.text(text,10,y);
y+=text.length*5+5;

let method=doc.splitTextToSize(methodology.innerText,180);
doc.text(method,10,y);
y+=method.length*5+5;

// table header
 doc.setFontSize(11);
 doc.text('Coverage Comparison',10,y);
y+=8;

 doc.setFontSize(9);
 Array.from(comparisonTable.rows).forEach(row=>{
  if(y>270){
   doc.addPage();
   addHeader(doc,2);
   y=25;
  }
  let cols=Array.from(row.cells).map(c=>c.innerText);
  doc.text(cols.join(' | '),10,y);
  y+=6;
 });

addFooter(doc,1);
doc.save('Albano-Executive-Report.pdf');
}
</script>

</body>
</html>
