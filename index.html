<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albano Insurance Solutions | Insurance Risk Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{margin:0;font-family:'Inter',sans-serif;background:#f7f9fc;color:#0a0a0a;}
.header{background:#0b2a45;color:#fff;padding:20px;font-size:22px;font-weight:700;display:flex;align-items:center;gap:15px;}
.logo{height:40px;}
.container{max-width:1100px;margin:auto;padding:20px;}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,.08);margin-bottom:20px;}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc;}
button{background:#0b2a45;color:#fff;padding:14px;border:none;border-radius:8px;cursor:pointer;width:100%;font-weight:700;}
.table{width:100%;border-collapse:collapse;margin-top:10px;}
.table td,.table th{border:1px solid #ddd;padding:10px;font-size:13px;text-align:left;}
.exec{background:#eef4fb;padding:15px;border-radius:8px;margin-top:15px;white-space:pre-line;}
</style>
</head>
<body>

<div class="header">
<img src="logo.png" class="logo" onerror="this.style.display='none'">
Albano Insurance Solutions | Insurance Risk Analysis Report
</div>

<div class="container">

<div class="card" id="leadCard">
<input id="business" placeholder="Business Name">
<input id="email" placeholder="Email">
<select id="trade">
<option>Electrician</option>
<option>Plumber</option>
<option>Painter</option>
<option>HVAC</option>
<option>General Contractor</option>
</select>
<input id="revenue" placeholder="Annual Revenue ($)">

<h4>Current Insurance Premium Input</h4>
<input id="gl" placeholder="General Liability ($)">
<input id="wc" placeholder="Workers Comp ($)">
<input id="auto" placeholder="Commercial Auto ($)">
<input id="equip" placeholder="Equipment ($)">
<input id="umbrella" placeholder="Umbrella ($)">

<button onclick="submitLead()">Generate My Report</button>
</div>

<div class="card" id="report" style="display:none">
<div id="execSummary" class="exec"></div>
<canvas id="barChart" width="400" height="150"></canvas>
<table class="table" id="comparisonTable"></table>
<button onclick="downloadPDF()">Download Executive Report</button>
</div>

</div>

<script>
function parseNumber(v){return parseFloat((v||'').replace(/,/g,''))||0}
function fmt(n){return "$"+Math.round(n).toLocaleString()}

const TRADE={
 Electrician:{gl:.005,auto:.018,inland:.008,umb:.002,payroll:.32,wc:4.5},
 Plumber:{gl:.006,auto:.02,inland:.01,umb:.0025,payroll:.35,wc:5.5},
 Painter:{gl:.0045,auto:.015,inland:.007,umb:.002,payroll:.30,wc:6},
 HVAC:{gl:.0055,auto:.02,inland:.009,umb:.0025,payroll:.34,wc:5},
 "General Contractor":{gl:.007,auto:.022,inland:.012,umb:.003,payroll:.38,wc:6.5}
};

function benchmark(trade,rev){
let t=TRADE[trade];
let payroll=rev*t.payroll;
return{
 gl:rev*t.gl,
 wc:(payroll/100)*t.wc,
 auto:rev*t.auto,
 equip:rev*t.inland,
 umbrella:rev*t.umb
};
}

function submitLead(){
const report = document.getElementById('report');
const comparisonTable = document.getElementById('comparisonTable');
const execSummary = document.getElementById('execSummary');

let lead={
 trade:document.getElementById('trade').value,
 revenue:parseNumber(document.getElementById('revenue').value),
 gl:parseNumber(document.getElementById('gl').value),
 wc:parseNumber(document.getElementById('wc').value),
 auto:parseNumber(document.getElementById('auto').value),
 equip:parseNumber(document.getElementById('equip').value),
 umbrella:parseNumber(document.getElementById('umbrella').value)
};

let bench=benchmark(lead.trade,lead.revenue);

let labels=['GL','WC','Auto','Equip','Umb'];
let current=[lead.gl,lead.wc,lead.auto,lead.equip,lead.umbrella];
let expected=[bench.gl,bench.wc,bench.auto,bench.equip,bench.umbrella];

// Draw bar chart
let ctx=document.getElementById('barChart').getContext('2d');
ctx.clearRect(0,0,400,150);

for(let i=0;i<labels.length;i++){
 let x=i*70+30;
 let currHeight=current[i]/1000;
 let expHeight=expected[i]/1000;

 ctx.fillStyle='#0b2a45';
 ctx.fillRect(x,140-currHeight,15,currHeight);

 ctx.fillStyle='#5dade2';
 ctx.fillRect(x+20,140-expHeight,15,expHeight);

 ctx.fillStyle='#000';
 ctx.fillText(labels[i],x,145);
}

let totalDiff=current.reduce((a,c,i)=>a+(c-expected[i]),0);
let jobs=Math.max(lead.revenue/5000,1);
let perJob=totalDiff/jobs;

execSummary.innerText=`EXECUTIVE SUMMARY

Market Outlook:
Insurance costs are rising across California contractors.

Current Status:
You are spending above benchmark in key areas.

Estimated Overpayment:
${fmt(totalDiff)} annually

Per Job Impact:
~${fmt(perJob)} added cost per job

Opportunities:
• Carrier re-market
• WC optimization
• Coverage alignment

Carrier Strategy:
Target markets: Liberty Mutual, AmTrust, Nationwide, UFG

Call Chris Gibson
916-864-4983`;

comparisonTable.innerHTML=`<tr><th>Coverage</th><th>Current</th><th>Expected</th></tr>`+
labels.map((l,i)=>`<tr><td>${l}</td><td>${fmt(current[i])}</td><td>${fmt(expected[i])}</td></tr>`).join('');

report.style.display='block';
}

function downloadPDF(){
const {jsPDF}=window.jspdf;
const doc=new jsPDF();

// --- FIX 1: Ensure content exists before generating ---
const execEl = document.getElementById('execSummary');
const tableEl = document.getElementById('comparisonTable');
const chartEl = document.getElementById('barChart');

if(!execEl.innerText || tableEl.rows.length === 0){
 alert('Please generate the report first');
 return;
}

// --- FIX 2: Better logo handling (safe try/catch) ---
try{
 const logoBase64="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAAB";
 doc.addImage(logoBase64,'PNG',10,5,40,15);
}catch(e){console.log('Logo failed to load');}

let y=25;

// Title
 doc.setFontSize(16);
 doc.text('Insurance Risk Analysis Report',10,y);
 y+=10;

// --- FIX 3: Executive Summary Box ---
let exec = execEl.innerText;
let split = doc.splitTextToSize(exec,180);

 doc.setDrawColor(200);
 doc.rect(10,y-5,190,split.length*5+10);
 doc.setFontSize(10);
 doc.text(split,12,y);
 y+=split.length*5+15;

// --- FIX 4: Chart Rendering Stability ---
try{
 let imgData = chartEl.toDataURL('image/png',1.0);
 doc.addImage(imgData,'PNG',10,y,180,60);
 y+=70;
}catch(e){
 console.log('Chart failed to render');
}

// --- FIX 5: Structured Table ---
const colX=[10,70,120];

 doc.setFillColor(11,42,69);
 doc.setTextColor(255);
 doc.rect(10,y-5,190,8,'F');
 ['Coverage','Current','Expected'].forEach((h,i)=>doc.text(h,colX[i],y));
 y+=8;
 doc.setTextColor(0);

Array.from(tableEl.rows).slice(1).forEach(r=>{
 if(y>270){doc.addPage();y=20;}
 let cells=Array.from(r.cells);
 cells.forEach((c,i)=>{
  doc.text(c.innerText,colX[i],y);
 });
 y+=7;
});

// --- FIX 6: Footer always prints ---
 doc.setFontSize(8);
 doc.text('Albano Insurance Solutions | License #0442296',10,290);
 doc.text('Chris Gibson | 916-864-4983 | cgibson@addlins.com',70,290);

 doc.save('Albano-Executive-Report.pdf');
}=window.jspdf;
const doc=new jsPDF();

// Base64 logo placeholder (replace!)
const logoBase64="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAAB";
doc.addImage(logoBase64,'PNG',10,5,40,15);

let y=25;
doc.setFontSize(14);
doc.text('Insurance Risk Analysis Report',10,y);
y+=10;

let exec=document.getElementById('execSummary').innerText;
let split=doc.splitTextToSize(exec,180);
doc.text(split,10,y);
y+=split.length*5+10;

// Add chart image
let chart=document.getElementById('barChart');
let imgData=chart.toDataURL('image/png');
doc.addImage(imgData,'PNG',10,y,180,60);
y+=70;

// Table
let table=document.getElementById('comparisonTable');
Array.from(table.rows).forEach(r=>{
 if(y>270){doc.addPage();y=20;}
 let txt=Array.from(r.cells).map(c=>c.innerText).join(' | ');
 doc.text(txt,10,y);
 y+=6;
});

// Footer
 doc.setFontSize(8);
 doc.text('Albano Insurance Solutions | License #0442296',10,290);
 doc.text('Chris Gibson | 916-864-4983 | cgibson@addlins.com',80,290);

 doc.save('Albano-Executive-Report.pdf');
}
</script>

</body>
</html>
