<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albano Insurance | Insurance Risk Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body{margin:0;font-family:'Inter',sans-serif;background:#fff;color:#0a0a0a}
.header{background:linear-gradient(90deg,#0b2a45,#1f6fb2);color:#fff;padding:22px;font-size:22px;font-weight:700;text-align:center}
.container{max-width:1100px;margin:auto;padding:30px}
.card{background:#fff;padding:24px;border-radius:14px;border:1px solid #e6edf5;box-shadow:0 10px 25px rgba(0,0,0,.05);margin-bottom:20px}
input,select{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:1px solid #d6e0ea}
button{background:linear-gradient(90deg,#0b2a45,#1f6fb2);color:#fff;padding:14px;border:none;border-radius:8px;width:100%;font-weight:700}
.table{width:100%;border-collapse:collapse;margin-top:15px}
.table td,.table th{border:1px solid #e6edf5;padding:10px}
.table th{background:#0b2a45;color:#fff}
.high{background:#fdeaea}.mid{background:#fff5e6}.low{background:#e6f6ec}
.exec{background:#f3f7fc;padding:18px;border-left:4px solid #1f6fb2;white-space:pre-line}
.footer{text-align:center;margin-top:20px;font-size:12px;color:#666}
.score{font-size:24px;font-weight:700;margin-bottom:10px}
.impact{font-size:16px;font-weight:600;color:#b22222;margin-bottom:10px}
.error{color:#b22222;font-size:13px;display:none}
.gauge-wrap{display:flex;align-items:center;gap:20px;margin-bottom:10px}
</style>
</head>
<body>
<div class="header">Insurance Risk Analysis Report</div>
<div class="container">

<div class="card">
<input id="business" placeholder="Business Name">
<input id="email" type="email" placeholder="Email (required)">
<div id="emailError" class="error">Please enter a valid email.</div>
<select id="trade">
<option>Electrician</option>
<option>Plumber</option>
<option>Painter</option>
<option>HVAC</option>
<option>General Contractor</option>
</select>
<input id="revenue" placeholder="Annual Revenue" oninput="fmtInput(this)">
<input id="payroll" placeholder="Payroll (optional)" oninput="fmtInput(this)">
<input id="autos" placeholder="# Vehicles" oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<h4>Current Premiums</h4>
<input id="gl" placeholder="General Liability" oninput="fmtInput(this)">
<input id="wc" placeholder="Workers Comp" oninput="fmtInput(this)">
<input id="auto" placeholder="Auto" oninput="fmtInput(this)">
<input id="umbrella" placeholder="Umbrella" oninput="fmtInput(this)">

<button type="button" id="generateBtn" onclick="runAnalysis(); return false;">Generate Report</button>
</div>

<div class="card" id="report" style="display:none;background:#ffffff;padding:20px;border:1px solid #dfe7f1">
<div class="gauge-wrap">
<canvas id="gauge" width="120" height="120"></canvas>
<div>
<div id="riskScore" class="score"></div>
<div id="jobImpact" class="impact"></div>
</div>
</div>
<div id="summary" class="exec"></div>
<table id="table" class="table"></table>
<button type="button" id="pdfBtn" onclick="downloadPDF(); return false;">Download PDF</button>
</div>

<div class="footer">
<img src="AlbanoInsurance_logo-fullcolor.png" style="height:50px" onerror="this.style.display='none'"><br>
CA License #0442296
</div>

</div>

<script>
function num(v){
  return parseFloat(
    String(v || '')
      .replace(/,/g,'')
      .replace(/[^0-9.-]/g,'')
  ) || 0
}
function money(n){
  return "$" + Number(n || 0).toLocaleString('en-US',{
    minimumFractionDigits:2,
    maximumFractionDigits:2
  })
}
function fmtInput(el){

  let cursorPosition = el.selectionStart

  let raw = String(el.value || '')
    .replace(/,/g,'')
    .replace(/[^0-9.]/g,'')

  if(raw === ''){
    el.value = ''
    return
  }

  const parts = raw.split('.')

  let whole = parts[0]
  let decimal = parts[1] || ''

  whole = Number(whole).toLocaleString('en-US')

  el.value = decimal.length > 0
    ? `${whole}.${decimal.slice(0,2)}`
    : whole

  setTimeout(() => {
    el.setSelectionRange(cursorPosition, cursorPosition)
  },0)
}
function validEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)}

function drawGauge(score){
 const c=document.getElementById('gauge')
 const ctx=c.getContext('2d')
 ctx.clearRect(0,0,120,120)

 let color = score>75 ? '#2ecc71' : score>55 ? '#f1c40f' : '#e74c3c'

 ctx.beginPath()
 ctx.arc(60,60,50,0,Math.PI*2)
 ctx.strokeStyle='#eee'
 ctx.lineWidth=10
 ctx.stroke()

 ctx.beginPath()
 ctx.arc(60,60,50,-Math.PI/2,(score/100)*Math.PI*2-Math.PI/2)
 ctx.strokeStyle=color
 ctx.lineWidth=10
 ctx.stroke()

 ctx.font='20px Inter'
 ctx.fillStyle='#000'
 ctx.textAlign='center'
 ctx.fillText(score,60,68)
}

const DATA={base:{gl:.005,autoPerUnit:1800,umb:.002},wcRates:{Electrician:4.5,Plumber:5.5,Painter:6,HVAC:5,"General Contractor":6.5},payrollPct:{Electrician:.32,Plumber:.35,Painter:.30,HVAC:.34,"General Contractor":.38}}

function benchmark(trade,rev,payroll,autos){
let p=payroll||rev*DATA.payrollPct[trade]
return{gl:rev*DATA.base.gl,wc:(p/100)*DATA.wcRates[trade],auto:(autos||0)*DATA.base.autoPerUnit,umbrella:rev*DATA.base.umb}
}

function heat(p){return p>25?'high':p>10?'mid':'low'}

let state = null;

function runAnalysis() {

  try {

    const emailVal = document.getElementById('email').value.trim()

    if (!validEmail(emailVal)) {
      document.getElementById('emailError').style.display = 'block'
      return
    } else {
      document.getElementById('emailError').style.display = 'none'
    }

    const rev = num(document.getElementById('revenue').value)

    if (!rev || rev <= 0) {
      alert('Please enter annual revenue')
      return
    }

    const tradeSel = document.getElementById('trade').value
    const payrollVal = num(document.getElementById('payroll').value)
    const autosVal = num(document.getElementById('autos').value)

    const bench = benchmark(tradeSel, rev, payrollVal, autosVal)

    const cur = {
      gl: num(document.getElementById('gl').value),
      wc: num(document.getElementById('wc').value),
      auto: num(document.getElementById('auto').value),
      umbrella: num(document.getElementById('umbrella').value)
    }

    const rows = ['gl','wc','auto','umbrella']

    const names = {
      gl: 'General Liability',
      wc: 'Workers Compensation',
      auto: 'Commercial Auto',
      umbrella: 'Umbrella'
    }

    let html = `
      <tr>
        <th>Coverage</th>
        <th>Current</th>
        <th>Benchmark</th>
        <th>Difference</th>
        <th>Variance</th>
      </tr>
    `

    let insights = []
    let total = 0
    let score = 100

    rows.forEach(k => {

      const current = cur[k] || 0
      const expected = bench[k] || 0
      const diff = current - expected
      const pct = expected ? (diff / expected) * 100 : 0

      if (diff > 0) {
        total += diff
        insights.push({ k, impact: diff })
        score -= Math.min(25, Math.abs(pct))
      }

      html += `
        <tr class="${heat(pct)}">
          <td>${names[k]}</td>
          <td>${money(current)}</td>
          <td>${money(expected)}</td>
          <td>${money(diff)}</td>
          <td>${pct.toFixed(1)}%</td>
        </tr>
      `
    })

    score = Math.max(40, Math.round(score))

    drawGauge(score)

    insights.sort((a,b) => b.impact - a.impact)

    const peerDelta = Math.max(0, Math.round(100 - score))

    state = {
      total,
      insights,
      tableHTML: html,
      score,
      peerDelta,
      names
    }

    document.getElementById('riskScore').innerText =
      `Risk Score vs Peers: ${score}/100`

    document.getElementById('jobImpact').innerText =
      `You may be paying more than ${peerDelta}% of similar California contractors based on peer benchmark scoring.`

    document.getElementById('summary').innerText =
`Estimated Premium Variance: ${money(total)}

Industry Benchmark Findings:

This analysis compares your insurance structure against California contractor peer benchmarks using WCIRB payroll modeling, commercial auto fleet assumptions, and trade-specific liability benchmarks.

Top Cost Drivers:

${insights.slice(0,3).map(i => `• ${names[i.k]}: ${money(i.impact)}`).join('\n')}

Recommended Action:

Review pricing, endorsements, exclusions, subcontractor limitations, and carrier alignment.

Contact Chris Gibson:
916-864-4983
cgibson@addlins.com`

    document.getElementById('table').innerHTML = html

    document.getElementById('report').style.display = 'block'
    document.getElementById('report').offsetHeight

  } catch(err) {

    console.error(err)

    console.error(err)
    alert('Calculation error. Please verify all fields are completed correctly.')
  }
}

async function downloadPDF(){

 if(typeof html2canvas === 'undefined'){
   alert('PDF library failed to load. Please refresh the page.')
   return
 }

 if(typeof window.jspdf === 'undefined'){
   alert('PDF engine failed to load. Please refresh the page.')
   return
 }
 const { jsPDF } = window.jspdf
 if(!state) return alert('Run report first')

 const doc = new jsPDF('landscape','mm','a4')
 const pageWidth = 297
 const pageHeight = 210

 // ===== SPLIT HEADER =====
 // LEFT SIDE WHITE FOR LOGO
 doc.setFillColor(255,255,255)
 doc.rect(0,0,145,24,'F')

 // RIGHT SIDE BLUE FOR TITLE
 doc.setFillColor(11,42,69)
 doc.rect(145,0,152,24,'F')

 // HEADER TITLE
 doc.setTextColor(255)
 doc.setFontSize(16)
 doc.text('Insurance Risk Analysis Executive Summary',155,15)

 // ===== LOGO =====
 const logo = document.querySelector('.footer img')
 if(logo && logo.complete){
   try{
     const canvas = document.createElement('canvas')
     canvas.width = logo.naturalWidth
     canvas.height = logo.naturalHeight
     const ctx = canvas.getContext('2d')
     ctx.drawImage(logo,0,0)
     const logoData = canvas.toDataURL('image/png')
     doc.addImage(logoData,'PNG',12,4,70,16)
   }catch(e){console.log(e)}
 }

 doc.setTextColor(0)

 // ===== CLIENT INFO =====
 const biz = document.getElementById('business').value || 'Client'
 const tradeVal = document.getElementById('trade').value

 doc.setFontSize(11)
 doc.text(`Prepared For: ${biz}`,12,35)
 doc.text(`Trade: ${tradeVal}`,12,42)
 doc.text(`Risk Score: ${state.score}/100`,12,49)
 doc.text(`Estimated Overpayment: ${money(state.total)}`,12,56)
 const peerDelta = Math.max(0, Math.round(100 - state.score))
 doc.text(`Peer Benchmark Variance: You may be paying more than ${peerDelta}% of similar contractors`,12,63)

 // ===== EXECUTIVE SUMMARY =====
 doc.setFontSize(13)
 doc.text('Executive Summary',12,78)
 doc.setDrawColor(180)
 doc.line(12,81,140,81)

 doc.setFontSize(10)
 const narrative = [
  'This analysis benchmarks your insurance program against California contractor peer data using WCIRB payroll modeling, commercial auto fleet benchmarks, and trade-specific liability trends.',
  `Primary pricing concerns were identified in: ${state.insights.slice(0,3).map(i=>state.names[i.k]).join(', ')}.`,
  'Businesses scoring materially outside peer benchmarks may be paying more than similar California contractors based on risk score analysis and underwriting comparisons.',
  'Even when pricing appears competitive, policies should still be reviewed for exclusions, subcontractor limitations, endorsements, and carrier appetite alignment.'
 ]

 let y = 88
 narrative.forEach(n=>{
   const lines = doc.splitTextToSize(n,125)
   doc.text(lines,12,y)
   y += lines.length * 5 + 4
 })

 // ===== RECOMMENDATION BOX =====
 doc.setFillColor(243,247,252)
 doc.roundedRect(12,135,125,45,3,3,'F')

 doc.setFontSize(12)
 doc.text('Recommended Next Steps',18,146)

 doc.setFontSize(10)
 const recs = [
  '• Review Workers Compensation classification + payroll allocation',
  '• Evaluate commercial auto structure and fleet rating factors',
  '• Review GL exclusions, endorsements, and subcontractor limitations',
  '• Re-market coverage with carriers aligned to your trade profile'
 ]

 let ry = 154
 recs.forEach(r=>{
   doc.text(r,18,ry)
   ry += 6
 })

 doc.setFontSize(11)
 doc.text('Schedule a coverage review with Chris Gibson',18,178)
 doc.setFontSize(10)
 doc.text('916-864-4983 | cgibson@addlins.com',18,185)

 // ===== VISUAL REPORT SECTION =====
 await new Promise(resolve => setTimeout(resolve,250))

 const reportNode = document.getElementById('report')
 const downloadBtn = reportNode.querySelector('button')
 if(downloadBtn) downloadBtn.style.display='none'

 try {

 const canvas = await html2canvas(reportNode,{
   scale:1.4,
   backgroundColor:'#ffffff',
   useCORS:true,
   logging:false,
   scrollY:-window.scrollY
 })

 const img = canvas.toDataURL('image/png')

 const maxWidth = 120
 const maxHeight = 120

 const ratio = Math.min(maxWidth / canvas.width, maxHeight / canvas.height)
 const imgWidth = canvas.width * ratio
 const imgHeight = canvas.height * ratio

 const xPos = 162
 const yPos = 48

 doc.addImage(img,'PNG',xPos,yPos,imgWidth,imgHeight)

 doc.setFontSize(9)
 doc.setTextColor(120)
 doc.line(12,198,285,198)
 doc.text('Albano Insurance Solutions | CA License #0442296',12,204)
 doc.text('Chris Gibson | 916-864-4983 | cgibson@addlins.com',175,204)

 if(downloadBtn) downloadBtn.style.display='block'

 setTimeout(()=>{
   doc.save('Insurance-Risk-Analysis-Executive-Summary.pdf')
 },200)

 } catch(err){
   console.error(err)
   alert('PDF generation failed.')
   if(downloadBtn) downloadBtn.style.display='block'
 }
}</script>

</body>
</html>
