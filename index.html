<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albano Insurance Solutions | Insurance Risk Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{margin:0;font-family:'Inter',sans-serif;background:#f7f9fc;color:#0a0a0a;}
.header{background:#0b2a45;color:#fff;padding:20px;font-size:22px;font-weight:700;}
.container{max-width:1100px;margin:auto;padding:20px;}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,.08);margin-bottom:20px;}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc;}
button{background:#0b2a45;color:#fff;padding:14px;border:none;border-radius:8px;cursor:pointer;width:100%;font-weight:700;}
.table{width:100%;border-collapse:collapse;margin-top:10px;}
.table td,.table th{border:1px solid #ddd;padding:8px;font-size:13px;text-align:left;}
.exec{background:#eef4fb;padding:15px;border-radius:8px;margin-top:15px;}
</style>
</head>
<body>

<div class="header">Albano Insurance Solutions | Insurance Risk Analysis Report</div>

<div class="container">

<div class="card" id="leadCard">
<input id="business" placeholder="Business Name">
<input id="email" placeholder="Email">
<select id="trade">
<option>Electrician</option>
<option>Plumber</option>
<option>Painter</option>
<option>HVAC</option>
<option>General Contractor</option>
</select>
<input id="revenue" placeholder="Annual Revenue ($)">

<h4>Current Insurance Premium Input</h4>
<input id="gl" placeholder="General Liability ($)">
<input id="wc" placeholder="Workers Comp ($)">
<input id="auto" placeholder="Commercial Auto ($)">
<input id="equip" placeholder="Equipment ($)">
<input id="umbrella" placeholder="Umbrella ($)">

<button onclick="submitLead()">Generate My Report</button>
</div>

<div class="card" id="report" style="display:none">
<div id="execSummary" class="exec"></div>
<table class="table" id="comparisonTable"></table>
<button onclick="downloadPDF()">Download Executive Report</button>
</div>

</div>

<script>
function parseNumber(v){return parseFloat((v||'').replace(/,/g,''))||0}
function fmt(n){return "$"+Math.round(n).toLocaleString()}

const TRADE={
 Electrician:{gl:.005,auto:.018,inland:.008,umb:.002,payroll:.32,wc:4.5},
 Plumber:{gl:.006,auto:.02,inland:.01,umb:.0025,payroll:.35,wc:5.5},
 Painter:{gl:.0045,auto:.015,inland:.007,umb:.002,payroll:.30,wc:6},
 HVAC:{gl:.0055,auto:.02,inland:.009,umb:.0025,payroll:.34,wc:5},
 "General Contractor":{gl:.007,auto:.022,inland:.012,umb:.003,payroll:.38,wc:6.5}
};

function benchmark(trade,rev){
let t=TRADE[trade];
let payroll=rev*t.payroll;
return{
 gl:rev*t.gl,
 wc:(payroll/100)*t.wc,
 auto:rev*t.auto,
 equip:rev*t.inland,
 umbrella:rev*t.umb
};
}

function analyze(lead,bench){
let rows=[];
let impacts=[];

function line(name,key){
let current=lead[key];
let expected=bench[key];
let diff=current-expected;
let pct=((diff/expected)*100)||0;
rows.push({name,current,expected,diff,pct});
if(diff>0){impacts.push({name,impact:diff});}
}

line('General Liability','gl');
line('Workers Comp','wc');
line('Commercial Auto','auto');
line('Equipment','equip');
line('Umbrella','umbrella');

impacts.sort((a,b)=>b.impact-a.impact);
return {rows,impacts};
}

function submitLead(){
let lead={
 business:business.value,
 trade:trade.value,
 revenue:parseNumber(revenue.value),
 gl:parseNumber(gl.value),
 wc:parseNumber(wc.value),
 auto:parseNumber(auto.value),
 equip:parseNumber(equip.value),
 umbrella:parseNumber(umbrella.value)
};

let bench=benchmark(lead.trade,lead.revenue);
let analysis=analyze(lead,bench);

comparisonTable.innerHTML=`
<tr><th>Coverage</th><th>Current</th><th>Expected</th><th>Over/Under</th><th>%</th></tr>
${analysis.rows.map(r=>`<tr><td>${r.name}</td><td>${fmt(r.current)}</td><td>${fmt(r.expected)}</td><td>${fmt(r.diff)}</td><td>${Math.round(r.pct)}%</td></tr>`).join('')}`;

let topIssues=analysis.impacts.slice(0,3).map(i=>`${i.name}: ${fmt(i.impact)} over expected`).join('\n');

execSummary.innerHTML=`
<b>Executive Summary</b><br><br>
Your insurance program was benchmarked against similar California contractors based on revenue and trade.<br><br>
Top Cost Drivers:\n${topIssues}<br><br>
These inefficiencies increase your cost of doing business and may force you to overbid jobs.<br><br>
Recommendation: Review WC classification, re-market carriers, and restructure liability program.<br><br>
Contact: Chris Gibson | 916-864-4983 | cgibson@addlins.com`;

report.style.display='block';
leadCard.style.display='none';
}

function addHeaderFooter(doc,page){
 doc.setFillColor(11,42,69);
 doc.rect(0,0,210,12,'F');
 doc.setTextColor(255,255,255);
 doc.setFontSize(10);
 doc.text('Albano Insurance Solutions',10,8);

 doc.setTextColor(0,0,0);
 doc.setFontSize(8);
 doc.text('9197 Greenback Lane, Suite E, Orangevale CA 95662 | License #0442296',10,290);
 doc.text('Page '+page,180,290);
}

function downloadPDF(){
const {jsPDF}=window.jspdf;
const doc=new jsPDF();

let margin=15;
let width=180;

addHeaderFooter(doc,1);

doc.setFontSize(14);
doc.text('Insurance Risk Analysis Report',margin,25);

let execText=doc.splitTextToSize(execSummary.innerText,width);
doc.setFontSize(10);
doc.text(execText,margin,35);

let y=80;
doc.setFontSize(12);
doc.text('Coverage Comparison',margin,y);
y+=8;

Array.from(comparisonTable.rows).forEach(row=>{
 let rowText=Array.from(row.cells).map(c=>c.innerText).join(' | ');
 doc.setFontSize(9);
 doc.text(rowText,margin,y);
 y+=6;
});

// page 2 if needed
if(y>260){
 doc.addPage();
 addHeaderFooter(doc,2);
}

 doc.save('Albano-Executive-Report.pdf');
}
</script>

</body>
</html>
