<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albano Insurance | Insurance Risk Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:'Inter',sans-serif;background:#fff;color:#0a0a0a}
.header{background:linear-gradient(90deg,#0b2a45,#1f6fb2);color:#fff;padding:22px;font-size:22px;font-weight:700;text-align:center}
.container{max-width:1100px;margin:auto;padding:30px}
.card{background:#fff;padding:24px;border-radius:14px;border:1px solid #e6edf5;box-shadow:0 10px 25px rgba(0,0,0,.05);margin-bottom:20px}
input,select{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:1px solid #d6e0ea}
button{background:linear-gradient(90deg,#0b2a45,#1f6fb2);color:#fff;padding:14px;border:none;border-radius:8px;width:100%;font-weight:700}
.table{width:100%;border-collapse:collapse;margin-top:15px}
.table td,.table th{border:1px solid #e6edf5;padding:10px}
.table th{background:#0b2a45;color:#fff}
.high{background:#f8d7da;color:#7f1d1d;font-weight:600}.mid{background:#fff3cd;color:#7c5a00;font-weight:600}.low{background:#d1fae5;color:#065f46;font-weight:600}
.heatmap-title{font-size:18px;font-weight:700;margin:18px 0 10px}
.heatmap-bar{height:18px;border-radius:30px;background:linear-gradient(90deg,#2ecc71,#f1c40f,#e74c3c);margin-top:8px;position:relative}
.heatmap-marker{position:absolute;top:-5px;width:4px;height:28px;background:#0b2a45;border-radius:4px}
.exec{background:#f3f7fc;padding:18px;border-left:4px solid #1f6fb2;white-space:pre-line}
.footer{text-align:center;margin-top:20px;font-size:12px;color:#666}
.score{font-size:24px;font-weight:700;margin-bottom:10px}
.impact{font-size:16px;font-weight:600;color:#b22222;margin-bottom:10px}
.error{color:#b22222;font-size:13px;display:none}
.gauge-wrap{display:flex;align-items:center;gap:20px;margin-bottom:10px}
</style>
</head>
<body>
<div class="header">Albano Insurance Solutions | California Contractor Insurance Benchmark Analysis</div>
<div class="container">

<div class="card">
<input id="business" placeholder="Business Name">
<input id="email" type="email" placeholder="Email Address (optional)">
<div id="emailError" class="error">Please enter a valid email.</div>
<select id="trade">
<option>Electrician</option>
<option>Plumber</option>
<option>Painter</option>
<option>HVAC</option>
<option>General Contractor</option>
</select>
<input id="revenue" placeholder="Annual Revenue" oninput="fmtInput(this)">
<input id="payroll" placeholder="Payroll (optional)" oninput="fmtInput(this)">
<input id="autos" placeholder="# Vehicles" oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<h4>Current Premiums</h4>
<input id="gl" placeholder="General Liability" oninput="fmtInput(this)">
<input id="wc" placeholder="Workers Comp" oninput="fmtInput(this)">
<input id="auto" placeholder="Auto" oninput="fmtInput(this)">
<input id="umbrella" placeholder="Umbrella" oninput="fmtInput(this)">

<button type="button" id="generateBtn">Generate Report</button>
</div>

<div class="card" id="report" style="display:none;background:#ffffff;padding:20px;border:1px solid #dfe7f1">
<div class="gauge-wrap">
<canvas id="gauge" width="120" height="120"></canvas>
<div>
<div id="riskScore" class="score"></div>
<div id="jobImpact" class="impact"></div>
</div>
</div>
<div id="summary" class="exec"></div>
<div class="heatmap-title">Premium Benchmark Heat Map</div>
<div class="heatmap-bar">
<div id="heatMarker" class="heatmap-marker" style="left:50%"></div>
</div>
<table id="table" class="table"></table>
<button type="button" id="pdfBtn">Download PDF</button>
</div>

<div class="footer">
<img src="AlbanoInsurance_logo-fullcolor.png" style="height:50px" onerror="this.style.display='none'"><br>
CA License #0442296
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const WEBHOOK_URL = 'https://hook.us2.make.com/r3k8n4tsh0lfn6fypy6welptxdkhigtq'

const APP = {
  state:null,
  config:{
    glRate:0.005,
    umbrellaRate:0.002,
    autoRate:1800,
    wcRates:{
      Electrician:4.5,
      Plumber:5.5,
      Painter:6,
      HVAC:5,
      'General Contractor':6.5
    },
    payrollFactors:{
      Electrician:.32,
      Plumber:.35,
      Painter:.30,
      HVAC:.34,
      'General Contractor':.38
    }
  }
}

function cleanNumber(value){
  return parseFloat(String(value || '').replace(/,/g,'').replace(/[^0-9.-]/g,'')) || 0
}

function formatMoney(value){
  return '$' + Number(value || 0).toLocaleString('en-US',{
    minimumFractionDigits:0,
    maximumFractionDigits:0
  })
}

function formatInput(input){
  const raw = String(input.value || '').replace(/,/g,'').replace(/[^0-9.]/g,'')
  if(!raw){
    input.value = ''
    return
  }
  const parts = raw.split('.')
  parts[0] = Number(parts[0]).toLocaleString('en-US')
  input.value = parts.join('.')
}

function calculateBenchmark(trade,revenue,payroll,autos){

  const payrollBasis = payroll || revenue * APP.config.payrollFactors[trade]

  return {
    gl: revenue * APP.config.glRate,
    wc: (payrollBasis / 100) * APP.config.wcRates[trade],
    auto: autos * APP.config.autoRate,
    umbrella: revenue * APP.config.umbrellaRate
  }
}

function varianceClass(value){
  if(value > 25) return 'high'
  if(value > 10) return 'mid'
  return 'low'
}

function drawGauge(score){

  const canvas = document.getElementById('gauge')
  const ctx = canvas.getContext('2d')

  ctx.clearRect(0,0,120,120)

  const color = score > 75
    ? '#2ecc71'
    : score > 55
    ? '#f1c40f'
    : '#e74c3c'

  ctx.beginPath()
  ctx.arc(60,60,48,0,Math.PI * 2)
  ctx.strokeStyle = '#dbe5f0'
  ctx.lineWidth = 10
  ctx.stroke()

  ctx.beginPath()
  ctx.arc(60,60,48,-Math.PI/2,((score / 100) * Math.PI * 2) - Math.PI/2)
  ctx.strokeStyle = color
  ctx.lineWidth = 10
  ctx.stroke()

  ctx.fillStyle = '#0b2a45'
  ctx.font = 'bold 22px Inter'
  ctx.textAlign = 'center'
  ctx.fillText(score,60,68)
}

async function pushLead(payload){

  try{

    console.log('Sending lead',payload)

    await fetch(WEBHOOK_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    })

  }catch(error){
    console.error('Webhook Error',error)
  }
}

async function runAnalysis(){

  try{

    const business = document.getElementById('business').value.trim()
    const email = document.getElementById('email').value.trim()
    const trade = document.getElementById('trade').value

    const revenue = cleanNumber(document.getElementById('revenue').value)
    const payroll = cleanNumber(document.getElementById('payroll').value)
    const autos = cleanNumber(document.getElementById('autos').value)

    if(!revenue){
      alert('Please enter annual revenue.')
      return
    }

    const current = {
      gl:cleanNumber(document.getElementById('gl').value),
      wc:cleanNumber(document.getElementById('wc').value),
      auto:cleanNumber(document.getElementById('auto').value),
      umbrella:cleanNumber(document.getElementById('umbrella').value)
    }

    const benchmark = calculateBenchmark(trade,revenue,payroll,autos)

    const labels = {
      gl:'General Liability',
      wc:'Workers Compensation',
      auto:'Commercial Auto',
      umbrella:'Umbrella'
    }

    let score = 100
    let varianceTotal = 0
    let tableHTML = `
      <tr>
        <th>Coverage</th>
        <th>Current</th>
        <th>Benchmark</th>
        <th>Variance</th>
      </tr>
    `

    Object.keys(current).forEach(key=>{

      const currentValue = current[key]
      const benchmarkValue = benchmark[key]
      const variance = benchmarkValue
        ? ((currentValue - benchmarkValue) / benchmarkValue) * 100
        : 0

      if(currentValue > benchmarkValue){
        varianceTotal += currentValue - benchmarkValue
        score -= Math.min(20,Math.abs(variance))
      }

      tableHTML += `
        <tr class="${varianceClass(Math.abs(variance))}">
          <td>${labels[key]}</td>
          <td>${formatMoney(currentValue)}</td>
          <td>${formatMoney(benchmarkValue)}</td>
          <td>${variance.toFixed(1)}%</td>
        </tr>
      `
    })

    score = Math.max(42,Math.round(score))

    const peerDelta = 100 - score

    APP.state = {
      business,
      trade,
      revenue,
      payroll,
      autos,
      score,
      peerDelta,
      varianceTotal,
      tableHTML
    }

    drawGauge(score)

    document.getElementById('riskScore').innerText = `Contractor Insurance Positioning Score: ${score}/100`

    document.getElementById('jobImpact').innerText = `Your insurance program appears to benchmark above approximately ${peerDelta}% of similar California contractors based on underwriting trend analysis.`

    document.getElementById('summary').innerHTML = `
      <strong>Executive Summary</strong><br><br>
      Estimated Annual Premium Variance: <strong>${formatMoney(varianceTotal)}</strong><br><br>

      California contractor insurance markets continue tightening across Workers Compensation, Commercial Auto, and Umbrella lines due to increased claims severity and underwriting scrutiny.<br><br>

      <strong>Recommended Next Steps</strong><br>
      • Review carrier competitiveness<br>
      • Review endorsements and exclusions<br>
      • Validate Workers Compensation classifications<br>
      • Review commercial auto fleet pricing<br><br>

      <strong>Contact Chris Gibson</strong><br>
      916-864-4983<br>
      cgibson@addlins.com
    `

    document.getElementById('table').innerHTML = tableHTML

    document.getElementById('heatMarker').style.left = `${Math.max(5,Math.min(95,peerDelta))}%`

    document.getElementById('report').style.display = 'block'

    await pushLead({
      business,
      email,
      trade,
      revenue,
      payroll,
      autos,
      riskScore:score,
      benchmarkDelta:peerDelta,
      premiumVariance:varianceTotal,
      generatedAt:new Date().toISOString()
    })

  }catch(error){

    console.error(error)
    alert('Unable to generate report.')
  }
}

async function downloadPDF(){

  if(!APP.state){
    alert('Please generate the report first.')
    return
  }

  const report = document.getElementById('report')

  const canvas = await html2canvas(report,{scale:1.3,backgroundColor:'#ffffff'})

  const img = canvas.toDataURL('image/png')

  const { jsPDF } = window.jspdf
  const pdf = new jsPDF('landscape','mm','a4')

  pdf.setFillColor(11,42,69)
  pdf.rect(0,0,297,18,'F')

  pdf.setTextColor(255)
  pdf.setFont('helvetica','bold')
  pdf.setFontSize(18)
  pdf.text('California Contractor Insurance Benchmark Analysis',14,12)

  pdf.setTextColor(60)
  pdf.setFontSize(9)
  pdf.text('Albano Insurance Solutions | CA License #0442296',14,25)

  pdf.setFillColor(243,247,252)
  pdf.roundedRect(10,34,82,42,3,3,'F')

  pdf.setTextColor(11,42,69)
  pdf.setFont('helvetica','bold')
  pdf.setFontSize(12)
  pdf.text('Client Summary',14,44)

  pdf.setFont('helvetica','normal')
  pdf.setFontSize(9)

  pdf.text(`Business: ${APP.state.business || 'Client'}`,14,54)
  pdf.text(`Trade: ${APP.state.trade}`,14,61)
  pdf.text(`Risk Score: ${APP.state.score}/100`,14,68)

  pdf.setFillColor(11,42,69)
  pdf.roundedRect(10,84,82,28,3,3,'F')

  pdf.setTextColor(255)
  pdf.setFont('helvetica','bold')
  pdf.text('Contact Chris Gibson',14,95)
  pdf.text('916-864-4983',14,102)
  pdf.text('cgibson@addlins.com',14,109)

  pdf.setFillColor(248,250,252)
  pdf.roundedRect(100,34,184,140,3,3,'F')

  pdf.setTextColor(11,42,69)
  pdf.setFontSize(12)
  pdf.text('Benchmark Visualization & Market Positioning',106,44)

  pdf.addImage(img,'PNG',106,50,170,110)

  pdf.setFontSize(8)
  pdf.setTextColor(120)
  pdf.text('Prepared by Albano Insurance Solutions',12,202)
  pdf.text('Chris Gibson | cgibson@addlins.com',220,202)

  pdf.save('Insurance-Risk-Analysis-Executive-Summary.pdf')
}

window.addEventListener('DOMContentLoaded',()=>{

  document.querySelectorAll('input').forEach(input=>{

    if(input.id !== 'autos' && input.type !== 'email'){
      input.addEventListener('input',()=>formatInput(input))
    }
  })

  document.getElementById('generateBtn').addEventListener('click',runAnalysis)

  document.getElementById('pdfBtn').addEventListener('click',downloadPDF)
})
</script>
</body>
</html>
