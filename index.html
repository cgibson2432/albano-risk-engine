<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albano Insurance Solutions | Contractor Risk Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#071a2f;color:#fff;}
.header{background:#0b2a45;padding:18px 24px;border-bottom:1px solid #1f3b5c;}
.brand{font-size:18px;font-weight:bold;}
.gold{color:#c89b3c;}
.container{max-width:1000px;margin:auto;padding:24px;}
.card{background:#0f2f4d;padding:18px;border-radius:10px;margin-bottom:16px;border:1px solid #1f3b5c;}
input,select{width:100%;padding:10px;border-radius:6px;border:none;margin:6px 0;}
.btn{background:#c89b3c;color:#000;font-weight:bold;border:none;padding:12px;width:100%;border-radius:6px;cursor:pointer;}
.hidden{display:none;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
canvas{background:#fff;border-radius:8px;padding:10px;}
</style>
</head>
<body>

<div class="header">
  <div class="brand"><span class="gold">Albano Insurance Solutions</span> | Risk Intelligence Desk</div>
</div>

<div class="container">

<div id="lead" class="card">
  <h2>Contractor Risk Report</h2>

  <label>Business Name</label>
  <input id="business">

  <label>Contact</label>
  <input id="contact">

  <label>Email</label>
  <input id="email">

  <label>Trade</label>
  <select id="trade">
    <option>Electrician</option>
    <option>Plumber</option>
    <option>HVAC</option>
  </select>

  <label>Estimated Annual Revenue ($)</label>
  <input id="revenue">

  <label>Current Annual Premium ($)</label>
  <input id="currentPremium" placeholder="e.g. 12000">

  <label><input type="checkbox" id="consent"> Consent</label>

  <button class="btn" onclick="submitLead()">Generate Report</button>
</div>

<div id="dash" class="hidden card">
  <h2>Risk Inputs</h2>
  <input id="height" placeholder="Height Exposure">
  <input id="hotwork" placeholder="Hot Work">
  <input id="claims" placeholder="Number of Claims (past 3-5 yrs)">
  <input id="claimvalue" placeholder="Total Value of Claims ($)">
  <input id="subexpo" placeholder="Sub Exposure">
  <button class="btn" onclick="runRisk()">Analyze</button>
</div>

<div id="report" class="hidden card">
  <h2>Executive Report Dashboard</h2>

  <div class="grid">
    <div>
      <canvas id="premiumChart"></canvas>
    </div>
    <div>
      <canvas id="riskChart"></canvas>
    </div>
  </div>

  <div class="card">
    <h3>Benchmark Summary</h3>
    <p id="benchmarkText"></p>
  </div>

  <button class="btn" onclick="generatePDF()">Download 2-Page Benchmark Report</button>
</div>

</div>

<script>
let lead={}, reportData={}, brokerStrategy={};
const MAKE_WEBHOOK_URL="https://hook.us2.make.com/r3k8n4tsh0lfn6fypy6welptxdkhigtq";
function $(id){return document.getElementById(id);} 
function view(id){document.querySelectorAll('.card').forEach(c=>c.classList.add('hidden'));$(id).classList.remove('hidden');} 
function postWebhook(data){fetch(MAKE_WEBHOOK_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)}).catch(()=>{});} 

function submitLead(){
  if(!$("consent").checked){alert("Consent required");return;}
  lead={
    business:$("business").value,
    contact:$("contact").value,
    email:$("email").value,
    trade:$("trade").value,
    revenue:parseFloat($("revenue").value)||0,
    currentPremium:parseFloat($("currentPremium").value)||0
  };
  postWebhook({event:"lead_created",lead});
  view("dash");
}

const CA_RATES={ Electrician:9.5, Plumber:8.2, HVAC:7.8 };
const WC_CLASS_CODES={ Electrician:[{code:"5190", rate:5.25}], Plumber:[{code:"5183", rate:4.75}], HVAC:[{code:"5537", rate:4.10}] };

function runRisk(){
  let h=+$('height').value||0;
  let hw=+$('hotwork').value||0;
  let c=+$('claims').value||0;
  let cv=+$('claimvalue').value||0;
  let s=+$('subexpo').value||0;

  let score=(h*2)+(hw*3)+(c*8)+((cv/10000)*5)+(s*1.5);
  let lossProfile=score>60?'Severe':score>30?'Moderate':'Clean';

  let benchmark=(lead.revenue/1000)*(CA_RATES[lead.trade]||8);
  let wc=(lead.revenue*0.3/100)*(WC_CLASS_CODES[lead.trade][0].rate);
  let modeled=benchmark+wc+(score*120);

  let current=lead.currentPremium||0;

  reportData={score,lossProfile,benchmark,modeled,current};

  renderCharts();
  view('report');
  postWebhook({event:'risk_scored',reportData});
}

function renderCharts(){
  new Chart($("premiumChart"),{
    type:'bar',
    data:{
      labels:['Current','Benchmark','Modeled'],
      datasets:[{data:[reportData.current,reportData.benchmark,reportData.modeled]}]
    }
  });

  new Chart($("riskChart"),{
    type:'doughnut',
    data:{
      labels:['Risk Score','Remaining'],
      datasets:[{data:[reportData.score,100-reportData.score]}]
    }
  });

  $("benchmarkText").innerText=
    `Loss Profile: ${reportData.lossProfile} | Benchmark Premium: $${Math.round(reportData.benchmark)} | Modeled Premium: $${Math.round(reportData.modeled)}`;
}

function generatePDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("Contractor Risk Benchmark Report",10,20);
  doc.text("Business: "+lead.business,10,30);
  doc.text("Trade: "+lead.trade,10,40);

  doc.text("Current Premium: $"+reportData.current,10,55);
  doc.text("Benchmark: $"+Math.round(reportData.benchmark),10,65);
  doc.text("Modeled: $"+Math.round(reportData.modeled),10,75);

  doc.text("Risk Score: "+reportData.score,10,90);
  doc.text("Loss Profile: "+reportData.lossProfile,10,100);

  doc.save("Risk_Report.pdf");
}
</script>

</body>
</html>
