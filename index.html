<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albano Insurance Solutions | Insurance Risk Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{margin:0;font-family:'Inter',sans-serif;background:#f7f9fc;color:#0a0a0a;}
.header{background:#0b2a45;color:#fff;padding:20px;font-size:22px;font-weight:700;}
.container{max-width:1100px;margin:auto;padding:20px;}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,.08);margin-bottom:20px;}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc;}
button{background:#0b2a45;color:#fff;padding:14px;border:none;border-radius:8px;cursor:pointer;width:100%;font-weight:700;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
canvas{height:260px !important;}
.table{width:100%;border-collapse:collapse;margin-top:10px;}
.table td,.table th{border:1px solid #ddd;padding:8px;font-size:13px;}
.alert{padding:12px;border-radius:8px;margin-bottom:12px;font-weight:600;}
.red{background:#fdeaea;color:#b30000;}
.orange{background:#fff5e6;color:#b26b00;}
.green{background:#e6f6ec;color:#1f9d55;}
.subtle{font-size:12px;color:#666;margin-top:6px;}
.exec{background:#eef4fb;padding:15px;border-radius:8px;margin-top:15px;}
</style>
</head>
<body>

<div class="header">Albano Insurance Solutions | Insurance Risk Analysis Report</div>

<div class="container">

<div class="card" id="leadCard">
<h3>Identify hidden cost & risk in your insurance program</h3>
<input id="business" placeholder="Business Name">
<input id="email" placeholder="Email">
<input id="cslb" placeholder="CSLB # (optional)">
<div class="subtle">Enter CSLB # to enhance your report (optional)</div>

<select id="trade">
<option>Electrician</option>
<option>Plumber</option>
<option>Painter</option>
<option>HVAC</option>
<option>General Contractor</option>
</select>
<input id="revenue" placeholder="Annual Revenue ($)">

<h4>Current Insurance Premium Input</h4>
<input id="gl" placeholder="General Liability ($)">
<input id="wc" placeholder="Workers Comp ($)">
<input id="auto" placeholder="Commercial Auto ($)">
<input id="equip" placeholder="Equipment ($)">
<input id="umbrella" placeholder="Umbrella ($)">

<button onclick="submitLead()">Generate My Report</button>
</div>

<div class="card" id="report" style="display:none">
<div id="alertBox"></div>
<div id="renewalHint"></div>

<div class="exec" id="execSummary"></div>

<div class="grid">
<canvas id="premiumChart"></canvas>
<canvas id="riskChart"></canvas>
</div>

<table class="table" id="comparisonTable"></table>
<p id="summary"></p>

<button onclick="downloadPDF()">Download Full Report</button>
</div>

</div>

<div style="background:#1c1c1c;color:#fff;padding:20px;text-align:center;font-size:13px;">
Albano Insurance Solutions | 9197 Greenback Lane, Suite E, Orangevale CA 95662 | License #0442296
</div>

<script>
let chart1, chart2;

function parseNumber(v){return parseFloat((v||'').replace(/,/g,''))||0}
function fmt(n){return "$"+Math.round(n).toLocaleString()}

const TRADE={
 Electrician:{gl:.005,auto:.018,inland:.008,umb:.002,payroll:.32,wc:4.5},
 Plumber:{gl:.006,auto:.02,inland:.01,umb:.0025,payroll:.35,wc:5.5},
 Painter:{gl:.0045,auto:.015,inland:.007,umb:.002,payroll:.30,wc:6},
 HVAC:{gl:.0055,auto:.02,inland:.009,umb:.0025,payroll:.34,wc:5},
 "General Contractor":{gl:.007,auto:.022,inland:.012,umb:.003,payroll:.38,wc:6.5}
};

function benchmark(trade,rev){
let t=TRADE[trade];
let payroll=rev*t.payroll;
return{
 gl:rev*t.gl,
 wc:(payroll/100)*t.wc,
 auto:rev*t.auto,
 equip:rev*t.inland,
 umbrella:rev*t.umb
};
}

function submitLead(){
if(chart1) chart1.destroy();
if(chart2) chart2.destroy();

let lead={
 business:business.value,
 email:email.value,
 trade:trade.value,
 revenue:parseNumber(revenue.value),
 gl:parseNumber(gl.value),
 wc:parseNumber(wc.value),
 auto:parseNumber(auto.value),
 equip:parseNumber(equip.value),
 umbrella:parseNumber(umbrella.value)
};

lead.total=lead.gl+lead.wc+lead.auto+lead.equip+lead.umbrella;
let bench=benchmark(lead.trade,lead.revenue);
let benchTotal=Object.values(bench).reduce((a,b)=>a+b,0);

let variance=((lead.total/benchTotal)-1)*100;

alertBox.innerHTML = variance>20
 ? '<div class="alert red">You are likely overpaying. This impacts your ability to win jobs.</div>'
 : '<div class="alert orange">There may be optimization opportunities.</div>';

// EXEC SUMMARY
execSummary.innerHTML = `
<b>Executive Summary:</b><br><br>
We analyzed your insurance program based on your reported revenue and trade classification. Using California contractor benchmarks (derived from payroll ratios, WCIRB rates, and typical premium-to-revenue ratios), we estimated what a similar business should be paying.<br><br>
<b>Your Total Insurance Cost:</b> ${fmt(lead.total)}<br>
<b>Industry Expected Cost:</b> ${fmt(benchTotal)}<br><br>
<b>Impact:</b> Higher insurance costs can force you to overbid jobs, making you less competitive.<br><br>
<b>Recommendation:</b> A structured review of your Workers Compensation classification, liability structure, and carrier placement is recommended.<br><br>
<b>Next Step:</b> Contact Chris Gibson at 916-864-4983 or cgibson@addlins.com for a full strategy review.
`;

chart1 = new Chart(document.getElementById('premiumChart'),{
 type:'bar',
 data:{labels:['GL','WC','Auto','Equip','Umb'],datasets:[{label:'Current',data:[lead.gl,lead.wc,lead.auto,lead.equip,lead.umbrella]},{label:'Industry Expected',data:Object.values(bench)}]}
});

chart2 = new Chart(document.getElementById('riskChart'),{
 type:'bar',
 data:{labels:['Total Cost vs Expected'],datasets:[{data:[lead.total,benchTotal]}]}
});

comparisonTable.innerHTML=`
<tr><th>Coverage</th><th>Current</th><th>Expected</th></tr>
<tr><td>Total</td><td>${fmt(lead.total)}</td><td>${fmt(benchTotal)}</td></tr>
`;

summary.innerText=`Difference: ${fmt(lead.total-benchTotal)}`;

report.style.display='block';
leadCard.style.display='none';
}

function downloadPDF(){
const {jsPDF}=window.jspdf;
const doc=new jsPDF();

let img1 = chart1.toBase64Image();
let img2 = chart2.toBase64Image();

// PAGE 1
 doc.text('Insurance Risk Analysis Report',10,10);
 doc.addImage(img1,'PNG',10,20,180,60);
 doc.text(execSummary.innerText || execSummary.innerHTML.replace(/<[^>]+>/g,''),10,90);

// PAGE 2
 doc.addPage();
 doc.addImage(img2,'PNG',10,20,180,60);
 doc.text(summary.innerText,10,100);

 doc.text('Contact Chris Gibson | 916-864-4983 | cgibson@addlins.com',10,130);

 doc.save('Albano-Executive-Report.pdf');
}
</script>

</body>
</html>
