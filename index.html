<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albano Insurance Solutions | Insurance Risk Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{margin:0;font-family:'Inter',sans-serif;background:#f7f9fc;color:#0a0a0a;}
.header{background:#0b2a45;color:#fff;padding:20px;font-size:22px;font-weight:700;display:flex;align-items:center;gap:15px;}
.logo{height:45px;}
.container{max-width:1100px;margin:auto;padding:20px;}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,.08);margin-bottom:20px;}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc;}
button{background:#0b2a45;color:#fff;padding:14px;border:none;border-radius:8px;cursor:pointer;width:100%;font-weight:700;}
.table{width:100%;border-collapse:collapse;margin-top:10px;}
.table td,.table th{border:1px solid #ddd;padding:10px;font-size:13px;text-align:left;}
.high{background:#fdeaea;}
.mid{background:#fff5e6;}
.low{background:#e6f6ec;}
.exec{background:#eef4fb;padding:15px;border-radius:8px;margin-top:15px;white-space:pre-line;font-size:15px;font-weight:500;}
</style>
</head>
<body>

<div class="header">
<img src="AlbanoInsurance_logo-fullcolor.png" class="logo" onerror="this.style.display='none'">
Albano Insurance Solutions | Insurance Risk Analysis Report
</div>

<div class="container">

<div class="card" id="leadCard">
<input id="business" placeholder="Business Name">
<input id="email" placeholder="Email">
<select id="trade">
<option>Electrician</option>
<option>Plumber</option>
<option>Painter</option>
<option>HVAC</option>
<option>General Contractor</option>
</select>
<input id="revenue" placeholder="Annual Revenue ($)" oninput="formatCurrencyInput(this)" inputmode="decimal">

<h4>Current Insurance Premium Input</h4>
<input id="gl" placeholder="General Liability ($)" oninput="formatCurrencyInput(this)" inputmode="decimal">
<input id="wc" placeholder="Workers Comp ($)" oninput="formatCurrencyInput(this)" inputmode="decimal">
<input id="auto" placeholder="Commercial Auto ($)" oninput="formatCurrencyInput(this)" inputmode="decimal">
<input id="equip" placeholder="Equipment ($)" oninput="formatCurrencyInput(this)" inputmode="decimal">
<input id="umbrella" placeholder="Umbrella ($)" oninput="formatCurrencyInput(this)" inputmode="decimal">

<button onclick="submitLead()">Generate My Report</button>
</div>

<div class="card" id="report" style="display:none">
<div id="execSummary" class="exec"></div>
<table class="table" id="comparisonTable"></table>
<button onclick="downloadPDF()">Download Full Executive Report</button>
</div>

</div>

<script>
function parseNumber(v){return parseFloat((v||'').replace(/,/g,''))||0}
function fmt(n){return "$"+Math.round(n).toLocaleString('en-US')} 

// Format inputs with commas while typing
function formatCurrencyInput(el){
  let raw = (el.value||'').replace(/[^0-9.]/g,'');
  if(raw === ''){ el.value=''; return; }
  // prevent multiple decimals
  const parts = raw.split('.');
  if(parts.length > 2){ raw = parts[0] + '.' + parts.slice(1).join(''); }
  let num = parseFloat(raw);
  if(isNaN(num)){ el.value=''; return; }
  // keep integer display (no cents) for premiums
  el.value = Math.floor(num).toLocaleString('en-US');
}

const TRADE={
 Electrician:{gl:.005,auto:.018,inland:.008,umb:.002,payroll:.32,wc:4.5},
 Plumber:{gl:.006,auto:.02,inland:.01,umb:.0025,payroll:.35,wc:5.5},
 Painter:{gl:.0045,auto:.015,inland:.007,umb:.002,payroll:.30,wc:6},
 HVAC:{gl:.0055,auto:.02,inland:.009,umb:.0025,payroll:.34,wc:5},
 "General Contractor":{gl:.007,auto:.022,inland:.012,umb:.003,payroll:.38,wc:6.5}
};

function benchmark(trade,rev){
let t=TRADE[trade];
let payroll=rev*t.payroll;
return{
 gl:rev*t.gl,
 wc:(payroll/100)*t.wc,
 auto:rev*t.auto,
 equip:rev*t.inland,
 umbrella:rev*t.umb
};
}

function getHeat(pct){
 if(pct>25)return 'high';
 if(pct>10)return 'mid';
 return 'low';
}

let lastAnalysis = null;

function submitLead(){
const revenueInput = document.getElementById('revenue').value;
if(!revenueInput){alert('Please enter revenue');return;}

const report=document.getElementById('report');
const comparisonTable=document.getElementById('comparisonTable');
const execSummary=document.getElementById('execSummary');

let lead={
 trade:document.getElementById('trade').value,
 revenue:parseNumber(revenueInput),
 gl:parseNumber(document.getElementById('gl').value),
 wc:parseNumber(document.getElementById('wc').value),
 auto:parseNumber(document.getElementById('auto').value),
 equip:parseNumber(document.getElementById('equip').value),
 umbrella:parseNumber(document.getElementById('umbrella').value)
};

let bench=benchmark(lead.trade,lead.revenue);

let rows=[
 {name:'General Liability',key:'gl'},
 {name:'Workers Comp',key:'wc'},
 {name:'Commercial Auto',key:'auto'},
 {name:'Equipment',key:'equip'},
 {name:'Umbrella',key:'umbrella'}
];

let totalDiff=0;
let insights=[];

let tableHTML=`<tr><th>Coverage</th><th>Current</th><th>Expected</th><th>Variance</th><th>%</th></tr>`;

rows.forEach(r=>{
 let c=lead[r.key];
 let e=bench[r.key];
 let diff=c-e;
 let pct=e?((diff/e)*100):0;
 let cls=getHeat(pct);

 if(diff>0){
   totalDiff+=diff;
   insights.push({name:r.name,impact:diff});
 }

 tableHTML+=`<tr class="${cls}">
 <td>${r.name}</td>
 <td>${fmt(c)}</td>
 <td>${fmt(e)}</td>
 <td>${fmt(diff)}</td>
 <td>${Math.round(pct)}%</td>
 </tr>`;
});

comparisonTable.innerHTML=tableHTML;
insights.sort((a,b)=>b.impact-a.impact);
lastAnalysis = { totalDiff, insights };

execSummary.innerText=`You may be overpaying approximately ${fmt(totalDiff)} annually. Download the full report for detailed analysis.`;
report.style.display='block';
}

function downloadPDF(){
const { jsPDF } = window.jspdf;
const doc=new jsPDF();

const tableEl=document.getElementById('comparisonTable');
if(tableEl.rows.length===0 || !lastAnalysis){alert('Generate report first');return;}

const logo=new Image();
logo.src='AlbanoInsurance_logo-fullcolor.png';

logo.onload=function(){

// HEADER BAR
 doc.setFillColor(11,42,69);
 doc.rect(0,0,210,25,'F');
 doc.addImage(logo,'PNG',10,5,45,12);
 doc.setTextColor(255);
 doc.setFontSize(14);
 doc.text('Insurance Risk Analysis Report',60,14);
 doc.setFontSize(9);
 doc.text('Albano Insurance Solutions',60,20);
 doc.setTextColor(0);

let y=35;

// HEADLINE
 doc.setFillColor(240,244,251);
 doc.rect(10,y-5,190,15,'F');
 doc.setFontSize(16);
 doc.text(`Estimated Annual Overpayment: ${fmt(lastAnalysis.totalDiff)}`,15,y+5);
 y+=20;

// EXEC SUMMARY
 doc.setFontSize(12);
 doc.text('Executive Summary',10,y);
 y+=6;
 doc.setFontSize(10);
 let detail="This analysis compares your insurance program to California contractor benchmarks using revenue-based modeling, payroll assumptions, and WCIRB rate data.";
 let split=doc.splitTextToSize(detail,180);
 doc.text(split,10,y);
 y+=split.length*5+8;

// BENCHMARK EXPLANATION
 let formulaText = `How Benchmarks Are Calculated:
General Liability = Revenue x Industry Rate
Workers Comp = (Payroll x WC Rate per $100)
Payroll estimated as % of revenue
Auto, Equipment, Umbrella = % of revenue`;
 let fSplit = doc.splitTextToSize(formulaText,180);
 doc.text(fSplit,10,y);
 y+=fSplit.length*5+8;

// PRIORITIES
 doc.setFontSize(12);
 doc.text('Top Cost Reduction Opportunities',10,y);
 y+=6;
 doc.setFontSize(10);
 lastAnalysis.insights.slice(0,3).forEach(i=>{
  doc.text(`• ${i.name}: ${fmt(i.impact)}`,12,y);
  y+=5;
 });
 y+=8;

// TABLE HEADER
 const colX=[10,55,95,135,170];
 const rowHeight=8;
 doc.setFillColor(11,42,69);
 doc.setTextColor(255);
 doc.rect(10,y-6,190,rowHeight,'F');
 ['Coverage','Current','Expected','Variance','%'].forEach((h,i)=>{
  doc.text(h,colX[i],y);
 });
 y+=rowHeight;
 doc.setTextColor(0);

// TABLE ROWS
 Array.from(tableEl.rows).slice(1).forEach(r=>{
  if(y>270){doc.addPage();y=20;}

  let cells=Array.from(r.cells);
  let pct=parseFloat(cells[4].innerText)||0;

  if(pct>25){ doc.setFillColor(253,234,234);} 
  else if(pct>10){ doc.setFillColor(255,245,230);} 
  else { doc.setFillColor(230,246,236);} 

  doc.rect(10,y-6,190,rowHeight,'F');

  [10,55,95,135,170,200].forEach(x=>{
    doc.setDrawColor(220);
    doc.line(x,y-6,x,y+2);
  });

  cells.forEach((c,i)=>{
    doc.text(c.innerText,colX[i]+2,y);
  });

  doc.line(10,y+2,200,y+2);
  y+=rowHeight;
 });

// FOOTER
 doc.setDrawColor(200);
 doc.line(10,285,200,285);
 doc.setFontSize(8);
 doc.text('Albano Insurance Solutions | License #0442296',10,290);
 doc.text('Chris Gibson | 916-864-4983 | cgibson@addlins.com',90,290);

// PAGE 2
 doc.addPage();
 doc.setFontSize(14);
 doc.text('Market Outlook – California Contractors',10,20);
 doc.setFontSize(10);
 doc.text(doc.splitTextToSize('Insurance costs are rising due to claims, litigation, and stricter underwriting. This impacts contractor competitiveness and coverage availability.',180),10,30);

// PAGE 3
 doc.addPage();
 doc.setFontSize(14);
 doc.text('Risk & Coverage Narrative',10,20);
 doc.setFontSize(10);
 doc.text(doc.splitTextToSize('Lower premiums may indicate missing endorsements or exclusions. Overpayment indicates inefficiency. Both require review.',180),10,30);

// PAGE 4
 doc.addPage();
 doc.setFontSize(14);
 doc.text('Recommended Strategy',10,20);
 doc.setFontSize(10);
 doc.text(doc.splitTextToSize('Re-market high cost lines, validate endorsements, and align insurance structure with project requirements.',180),10,30);

 doc.save('Albano-Executive-Report.pdf');
};
}
</script>

</body>
</html>
