<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albano Insurance | Insurance Risk Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:'Inter',sans-serif;background:#fff;color:#0a0a0a}
.header{background:linear-gradient(90deg,#0b2a45,#1f6fb2);color:#fff;padding:22px;font-size:22px;font-weight:700;text-align:center}
.container{max-width:1100px;margin:auto;padding:30px}
.card{background:#fff;padding:24px;border-radius:14px;border:1px solid #e6edf5;box-shadow:0 10px 25px rgba(0,0,0,.05);margin-bottom:20px}
input,select{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:1px solid #d6e0ea}
button{background:linear-gradient(90deg,#0b2a45,#1f6fb2);color:#fff;padding:14px;border:none;border-radius:8px;width:100%;font-weight:700}
.table{width:100%;border-collapse:collapse;margin-top:15px}
.table td,.table th{border:1px solid #e6edf5;padding:10px}
.table th{background:#0b2a45;color:#fff}
.high{background:#f8d7da;color:#7f1d1d;font-weight:600}.mid{background:#fff3cd;color:#7c5a00;font-weight:600}.low{background:#d1fae5;color:#065f46;font-weight:600}
.heatmap-title{font-size:18px;font-weight:700;margin:18px 0 10px}
.heatmap-bar{height:18px;border-radius:30px;background:linear-gradient(90deg,#2ecc71,#f1c40f,#e74c3c);margin-top:8px;position:relative}
.heatmap-marker{position:absolute;top:-5px;width:4px;height:28px;background:#0b2a45;border-radius:4px}
.exec{background:#f3f7fc;padding:18px;border-left:4px solid #1f6fb2;white-space:pre-line}
.footer{text-align:center;margin-top:20px;font-size:12px;color:#666}
.score{font-size:24px;font-weight:700;margin-bottom:10px}
.impact{font-size:16px;font-weight:600;color:#b22222;margin-bottom:10px}
.error{color:#b22222;font-size:13px;display:none}
.gauge-wrap{display:flex;align-items:center;gap:20px;margin-bottom:10px}
</style>
</head>
<body>
<div class="header">Albano Insurance Solutions | Insurance Risk Analysis Executive Summary</div>
<div class="container">

<div class="card">
<input id="business" placeholder="Business Name">
<input id="email" type="email" placeholder="Email Address (optional)">
<div id="emailError" class="error">Please enter a valid email.</div>
<select id="trade">
<option>Electrician</option>
<option>Plumber</option>
<option>Painter</option>
<option>HVAC</option>
<option>General Contractor</option>
</select>
<input id="revenue" placeholder="Annual Revenue" oninput="fmtInput(this)">
<input id="payroll" placeholder="Payroll (optional)" oninput="fmtInput(this)">
<input id="autos" placeholder="# Vehicles" oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<h4>Current Premiums</h4>
<input id="gl" placeholder="General Liability" oninput="fmtInput(this)">
<input id="wc" placeholder="Workers Comp" oninput="fmtInput(this)">
<input id="auto" placeholder="Auto" oninput="fmtInput(this)">
<input id="umbrella" placeholder="Umbrella" oninput="fmtInput(this)">

<button type="button" id="generateBtn" onclick="runAnalysis(); return false;">Generate Report</button>
</div>

<div class="card" id="report" style="display:none;background:#ffffff;padding:20px;border:1px solid #dfe7f1">
<div class="gauge-wrap">
<canvas id="gauge" width="120" height="120"></canvas>
<div>
<div id="riskScore" class="score"></div>
<div id="jobImpact" class="impact"></div>
</div>
</div>
<div id="summary" class="exec"></div>
<div class="heatmap-title">Premium Benchmark Heat Map</div>
<div class="heatmap-bar">
<div id="heatMarker" class="heatmap-marker" style="left:50%"></div>
</div>
<table id="table" class="table"></table>
<button type="button" id="pdfBtn" onclick="downloadPDF(); return false;">Download PDF</button>
</div>

<div class="footer">
<img src="AlbanoInsurance_logo-fullcolor.png" style="height:50px" onerror="this.style.display='none'"><br>
CA License #0442296
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const WEBHOOK_URL = 'https://hook.us2.make.com/r3k8n4tsh0lfn6fypy6welptxdkhigtq'

const DATA = {
  base:{gl:.005,autoPerUnit:1800,umb:.002},
  wcRates:{
    Electrician:4.5,
    Plumber:5.5,
    Painter:6,
    HVAC:5,
    'General Contractor':6.5
  },
  payrollPct:{
    Electrician:.32,
    Plumber:.35,
    Painter:.30,
    HVAC:.34,
    'General Contractor':.38
  }
}

let state = null

function num(v){
  return parseFloat(String(v || '').replace(/,/g,'').replace(/[^0-9.-]/g,'')) || 0
}

function money(n){
  return '$' + Number(n || 0).toLocaleString('en-US',{
    minimumFractionDigits:2,
    maximumFractionDigits:2
  })
}

function fmtInput(el){

  const value = String(el.value || '').replace(/,/g,'').replace(/[^0-9.]/g,'')

  if(!value){
    el.value = ''
    return
  }

  const parts = value.split('.')
  const whole = Number(parts[0] || 0).toLocaleString('en-US')
  const decimal = parts[1] ? '.' + parts[1].slice(0,2) : ''

  el.value = whole + decimal
}

function drawGauge(score){

 const c = document.getElementById('gauge')
 const ctx = c.getContext('2d')

 ctx.clearRect(0,0,120,120)

 const color = score > 75
   ? '#2ecc71'
   : score > 55
   ? '#f1c40f'
   : '#e74c3c'

 ctx.beginPath()
 ctx.arc(60,60,50,0,Math.PI*2)
 ctx.strokeStyle='#e5e7eb'
 ctx.lineWidth=10
 ctx.stroke()

 ctx.beginPath()
 ctx.arc(60,60,50,-Math.PI/2,(score/100)*Math.PI*2-Math.PI/2)
 ctx.strokeStyle=color
 ctx.lineWidth=10
 ctx.stroke()

 ctx.font='20px Inter'
 ctx.fillStyle='#111827'
 ctx.textAlign='center'
 ctx.fillText(score,60,68)
}

function benchmark(trade,rev,payroll,autos){

 const p = payroll || rev * DATA.payrollPct[trade]

 return {
   gl: rev * DATA.base.gl,
   wc: (p / 100) * DATA.wcRates[trade],
   auto: (autos || 0) * DATA.base.autoPerUnit,
   umbrella: rev * DATA.base.umb
 }
}

function heatClass(p){
  return p > 25 ? 'high' : p > 10 ? 'mid' : 'low'
}

async function pushLead(payload){

  console.log('Sending Lead:', payload)

  try {

    const response = await fetch(WEBHOOK_URL,{
      method:'POST',
      headers:{
        'Content-Type':'application/json'
      },
      body:JSON.stringify(payload)
    })

    const result = await response.text()

    console.log('Webhook Success:', result)

  } catch(error){

    console.error('Webhook Error:', error)
  }
}

async function runAnalysis(){

  try {

    const business = document.getElementById('business').value.trim()
    const email = document.getElementById('email').value.trim()
    const trade = document.getElementById('trade').value

    const revenue = num(document.getElementById('revenue').value)
    const payroll = num(document.getElementById('payroll').value)
    const autos = num(document.getElementById('autos').value)

    if(!revenue || revenue <= 0){
      alert('Please enter annual revenue.')
      return
    }

    const current = {
      gl:num(document.getElementById('gl').value),
      wc:num(document.getElementById('wc').value),
      auto:num(document.getElementById('auto').value),
      umbrella:num(document.getElementById('umbrella').value)
    }

    const expected = benchmark(trade,revenue,payroll,autos)

    const rows = ['gl','wc','auto','umbrella']

    const names = {
      gl:'General Liability',
      wc:'Workers Compensation',
      auto:'Commercial Auto',
      umbrella:'Umbrella'
    }

    let totalVariance = 0
    let score = 100
    let insights = []

    let html = `
      <tr>
        <th>Coverage</th>
        <th>Current</th>
        <th>Benchmark</th>
        <th>Difference</th>
        <th>Variance</th>
      </tr>
    `

    rows.forEach(key => {

      const cur = current[key] || 0
      const bench = expected[key] || 0
      const diff = cur - bench
      const variance = bench ? ((diff / bench) * 100) : 0

      if(diff > 0){
        totalVariance += diff
        insights.push({key,impact:diff})
        score -= Math.min(25,Math.abs(variance))
      }

      html += `
        <tr class="${heatClass(Math.abs(variance))}">
          <td>${names[key]}</td>
          <td>${money(cur)}</td>
          <td>${money(bench)}</td>
          <td>${money(diff)}</td>
          <td>${variance.toFixed(1)}%</td>
        </tr>
      `
    })

    score = Math.max(40,Math.round(score))

    const peerDelta = Math.max(0,100 - score)

    insights.sort((a,b)=>b.impact-a.impact)

    state = {
      score,
      peerDelta,
      totalVariance,
      insights,
      html,
      names
    }

    drawGauge(score)

    document.getElementById('riskScore').innerText = `Risk Score vs Peers: ${score}/100`

    document.getElementById('jobImpact').innerText = `You may be paying more than ${peerDelta}% of similar California contractors based on peer benchmark scoring.`

    document.getElementById('summary').innerText =
`Estimated Premium Variance: ${money(totalVariance)}

California Market Summary:

California contractor insurance markets continue to experience underwriting tightening, commercial auto severity increases, and stronger underwriting scrutiny across Workers Compensation classifications.

Top Cost Drivers:

${insights.slice(0,3).map(i => `• ${names[i.key]}: ${money(i.impact)}`).join('
')}

Recommendations:

• Review pricing competitiveness
• Review endorsements and exclusions
• Evaluate carrier appetite alignment
• Review Workers Compensation classifications

Contact Chris Gibson for a complimentary insurance review:
916-864-4983
cgibson@addlins.com`

    document.getElementById('table').innerHTML = html

    const marker = document.getElementById('heatMarker')
    marker.style.left = `${Math.min(95,Math.max(5,peerDelta))}%`

    document.getElementById('report').style.display = 'block'

    await pushLead({
      business,
      email,
      trade,
      revenue,
      payroll,
      autos,
      riskScore:score,
      premiumVariance:totalVariance,
      benchmarkDelta:peerDelta,
      generatedAt:new Date().toISOString()
    })

  } catch(err){
    console.error(err)
    alert('Unable to generate report. Please review your inputs.')
  }
}

async function downloadPDF(){

  if(!state){
    alert('Please generate the report first.')
    return
  }

  const { jsPDF } = window.jspdf
  const doc = new jsPDF('landscape','mm','a4')

  doc.setFillColor(11,42,69)
  doc.rect(0,0,297,24,'F')

  doc.setTextColor(255)
  doc.setFontSize(18)
  doc.text('Insurance Risk Analysis Executive Summary',14,15)

  doc.setTextColor(0)
  doc.setFontSize(11)

  doc.text(`Business: ${document.getElementById('business').value || 'Client'}`,14,38)
  doc.text(`Trade: ${document.getElementById('trade').value}`,14,46)
  doc.text(`Risk Score: ${state.score}/100`,14,54)
  doc.text(`Premium Variance: ${money(state.totalVariance)}`,14,62)

  const reportNode = document.getElementById('report')

  const canvas = await html2canvas(reportNode,{
    scale:1.2,
    backgroundColor:'#ffffff'
  })

  const img = canvas.toDataURL('image/png')

  doc.addImage(img,'PNG',120,34,160,120)

  doc.setFontSize(9)
  doc.setTextColor(100)
  doc.line(10,198,287,198)
  doc.text('Albano Insurance Solutions | CA License #0442296',12,204)
  doc.text('Chris Gibson | 916-864-4983 | cgibson@addlins.com',165,204)

  doc.save('Insurance-Risk-Analysis-Executive-Summary.pdf')
}

window.addEventListener('DOMContentLoaded',()=>{

  document.getElementById('generateBtn').addEventListener('click',runAnalysis)

  document.getElementById('pdfBtn').addEventListener('click',downloadPDF)
})
</script>
</body>
</html>
